<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEWE — Operations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        :root {
            --bg: #03060f;
            --panel: rgba(255,255,255,0.035);
            --panel-strong: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.08);
            --border-strong: rgba(255,255,255,0.16);
            --text: #e8edf5;
            --text-dim: rgba(232,237,245,0.55);
            --text-faint: rgba(232,237,245,0.35);
            --accent: #60a5fa;
            --accent-dim: rgba(96,165,250,0.18);
            --ok: #4ade80;
            --ok-bg: rgba(74,222,128,0.10);
            --warn: #fbbf24;
            --warn-bg: rgba(251,191,36,0.10);
            --err: #f87171;
            --err-bg: rgba(248,113,113,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background:
                radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(96,165,250,0.04) 0%, transparent 50%),
                var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-weight: 400;
            min-height: 100vh;
            padding: 28px clamp(24px, 4vw, 56px) 48px;
            line-height: 1.45;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Top bar ────────────────────────────────────────────────── */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px;
        }
        .brand { display: flex; align-items: baseline; gap: 14px; }
        .brand .name {
            font-size: 22px; font-weight: 900; letter-spacing: 6px; color: #fff;
        }
        .brand .tag {
            font-size: 10px; font-weight: 600; letter-spacing: 3px; color: var(--text-faint);
            text-transform: uppercase;
        }
        .topbar a {
            color: var(--text-dim); text-decoration: none;
            font-size: 12px; font-weight: 600; letter-spacing: 1px;
            padding: 8px 14px; border-radius: 6px;
            transition: color .15s, background .15s;
            text-transform: uppercase;
        }
        .topbar a:hover { color: #fff; background: var(--panel); }

        /* ── Header ─────────────────────────────────────────────────── */
        .header {
            display: flex; justify-content: space-between; align-items: flex-end;
            gap: 20px; margin-bottom: 22px; flex-wrap: wrap;
        }
        .header-left h1 {
            font-size: clamp(22px, 2.4vw, 30px);
            font-weight: 700; letter-spacing: 0.3px; color: #fff;
        }
        .header-left .sub {
            font-size: 12px; color: var(--text-faint); letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .central-pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 999px;
            font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
            text-transform: uppercase;
        }
        .central-pill.ok  { background: var(--ok-bg);  color: var(--ok);  border: 1px solid rgba(74,222,128,0.30); }
        .central-pill.err { background: var(--err-bg); color: var(--err); border: 1px solid rgba(248,113,113,0.30); }
        .pill-dot {
            width: 7px; height: 7px; border-radius: 50%; background: currentColor;
            box-shadow: 0 0 6px currentColor;
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,100% { opacity: 1; }
            50%     { opacity: 0.35; }
        }

        /* ── KPI strip ──────────────────────────────────────────────── */
        .kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px; margin-bottom: 28px;
        }
        .kpi {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            position: relative; overflow: hidden;
        }
        .kpi::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
            background: var(--accent); opacity: 0.7;
        }
        .kpi.ok::before   { background: var(--ok);   }
        .kpi.warn::before { background: var(--warn); }
        .kpi.err::before  { background: var(--err);  }
        .kpi-label {
            font-size: 10.5px; font-weight: 700; letter-spacing: 1.3px;
            color: var(--text-dim); text-transform: uppercase;
            margin-bottom: 10px;
        }
        .kpi-value {
            font-size: 32px; font-weight: 800; color: #fff;
            line-height: 1; letter-spacing: -0.5px;
            font-variant-numeric: tabular-nums;
        }
        .kpi-value .sub {
            font-size: 14px; font-weight: 500; color: var(--text-dim);
            margin-left: 4px;
        }
        .kpi-note {
            font-size: 11px; color: var(--text-faint); margin-top: 6px;
        }

        /* ── Section header ────────────────────────────────────────── */
        .section-title {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 14px; font-weight: 700; letter-spacing: 1.5px;
            color: var(--text-dim); text-transform: uppercase;
            margin: 10px 0 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .section-title .count { font-weight: 400; color: var(--text-faint); letter-spacing: 0.5px; }

        /* ── Station grid ──────────────────────────────────────────── */
        .stations {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 14px;
        }
        .station {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color .2s, background .2s;
        }
        .station:hover { border-color: var(--border-strong); }
        .station.offline { opacity: 0.55; }
        .station-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 18px 12px;
            cursor: pointer; user-select: none;
        }
        .station-head:hover { background: rgba(255,255,255,0.02); }
        .station-id { display: flex; align-items: center; gap: 10px; }
        .status-led {
            width: 10px; height: 10px; border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
            flex-shrink: 0;
        }
        .led-on  { background: var(--ok);  color: var(--ok);  animation: dotPulse 2s ease-in-out infinite; }
        .led-off { background: var(--err); color: var(--err); }
        .station-name {
            font-size: 16px; font-weight: 700; color: #fff;
            letter-spacing: 0.5px;
        }
        .station-meta {
            font-size: 10.5px; color: var(--text-faint);
            letter-spacing: 0.8px; text-transform: uppercase;
            margin-top: 2px;
        }
        .station-coord {
            font-size: 10px; color: var(--text-faint);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.3px;
            margin-top: 2px;
        }
        .station-summary { font-size: 11px; color: var(--text-dim); text-align: right; }
        .station-summary .age { font-weight: 600; color: var(--text); }
        .station-rec {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 2px 8px; border-radius: 4px;
            font-size: 9.5px; font-weight: 700; letter-spacing: 1px;
            background: var(--err-bg); color: var(--err);
            margin-left: 6px;
        }
        .station-rec .dot {
            width: 5px; height: 5px; border-radius: 50%; background: currentColor;
            animation: recBlink 1.2s ease-in-out infinite;
        }
        @keyframes recBlink {
            0%,49%   { opacity: 1; }
            50%,100% { opacity: 0.25; }
        }
        .station-bat {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 7px; border-radius: 4px;
            font-size: 9.5px; font-weight: 700; letter-spacing: 0.5px;
            background: rgba(255,255,255,0.07); color: var(--text-faint);
            margin-left: 6px;
        }
        .station-bat.low  { background: rgba(255,80,60,0.15);  color: #ff6650; }
        .station-bat.med  { background: rgba(255,180,0,0.15);  color: #ffb800; }
        .station-bat.high { background: rgba(60,220,100,0.15); color: #3cdc64; }

        .station-body {
            padding: 0 18px 14px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .stat {
            background: rgba(255,255,255,0.025);
            border-radius: 8px;
            padding: 10px 12px;
        }
        .stat-label {
            font-size: 9.5px; font-weight: 700; letter-spacing: 1px;
            color: var(--text-faint); text-transform: uppercase;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 17px; font-weight: 700; color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .stat-value .u {
            font-size: 10px; font-weight: 500; color: var(--text-dim);
            margin-left: 2px;
        }

        /* ── Note field ────────────────────────────────────────────── */
        .note-wrap {
            margin: 0 18px 16px;
            background: rgba(255,255,255,0.018);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .note-wrap:focus-within { border-color: var(--accent); background: rgba(96,165,250,0.04); }
        .note-label {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 9.5px; font-weight: 700; letter-spacing: 1.2px;
            color: var(--text-faint); text-transform: uppercase;
        }
        .note-label .meta {
            font-weight: 500; letter-spacing: 0.5px; text-transform: none;
            font-size: 10px;
        }
        .note-label .meta.saved   { color: var(--ok); }
        .note-label .meta.saving  { color: var(--warn); }
        .note-label .meta.err     { color: var(--err); }
        .note-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            line-height: 1.5;
            resize: vertical;
            min-height: 36px;
            max-height: 200px;
            padding: 0;
            width: 100%;
        }
        .note-input::placeholder { color: var(--text-faint); font-style: italic; }
        .note-input:read-only { cursor: text; }

        /* ── Expandable detail ─────────────────────────────────────── */
        .detail {
            border-top: 1px solid var(--border);
            padding: 14px 18px 16px;
            display: none;
        }
        .station.expanded .detail { display: block; }
        .station.expanded .station-head .chevron { transform: rotate(180deg); }
        .chevron {
            width: 18px; height: 18px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-left: 8px;
            color: var(--text-faint);
            transition: transform .2s;
            font-size: 12px;
        }
        .detail-section { margin-bottom: 14px; }
        .detail-section:last-child { margin-bottom: 0; }
        .detail-title {
            font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
            color: var(--accent); text-transform: uppercase;
            margin-bottom: 8px;
        }
        .detail-empty {
            font-size: 12px; color: var(--text-faint);
            padding: 8px 0;
        }
        .chlist, .schedlist { display: flex; flex-direction: column; gap: 6px; }
        .chrow, .schedrow {
            display: grid;
            grid-template-columns: 30px 1fr auto auto;
            gap: 10px;
            align-items: center;
            font-size: 12px;
            padding: 8px 10px;
            background: rgba(255,255,255,0.025);
            border-radius: 6px;
        }
        .chrow .chnum, .schedrow .schnum {
            font-weight: 700; color: var(--accent);
            font-variant-numeric: tabular-nums; font-size: 11px;
        }
        .chrow .chmode {
            display: inline-block;
            font-size: 9.5px; font-weight: 700; letter-spacing: 0.8px;
            padding: 2px 6px; border-radius: 3px;
            background: var(--accent-dim); color: var(--accent);
            text-transform: uppercase;
            margin-right: 8px;
        }
        .chrow .chfreq, .schedrow .schfreq {
            color: #fff; font-weight: 600; font-variant-numeric: tabular-nums;
        }
        .chrow .chrec, .schedrow .schstatus {
            font-size: 9.5px; font-weight: 700; letter-spacing: 1px;
            padding: 2px 7px; border-radius: 4px;
        }
        .chrec.iq    { background: rgba(248,113,113,0.15); color: var(--err); }
        .chrec.audio { background: rgba(251,191,36,0.15); color: var(--warn); }
        .chrec.none  { background: rgba(255,255,255,0.04); color: var(--text-faint); }
        .schstatus.idle  { background: rgba(255,255,255,0.04); color: var(--text-faint); }
        .schstatus.armed { background: var(--warn-bg); color: var(--warn); }
        .schstatus.active{ background: var(--ok-bg); color: var(--ok); }
        .schstatus.done  { background: rgba(255,255,255,0.04); color: var(--text-faint); }

        .joins { display: flex; flex-wrap: wrap; gap: 6px; }
        .join-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 11px; border-radius: 999px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            font-size: 11.5px; color: var(--text);
        }
        .join-pill .tier {
            font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
            padding: 1px 5px; border-radius: 3px;
            background: var(--accent-dim); color: var(--accent);
        }

        .hist-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px;
        }
        .hist-item .lbl {
            font-size: 9.5px; font-weight: 700; letter-spacing: 1px;
            color: var(--text-faint); text-transform: uppercase;
            margin-bottom: 3px;
        }
        .hist-item .val {
            font-size: 13px; color: #fff; font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .bat-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .bat-pct { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 52px; }
        .bat-pct.low  { color: #ff6650; }
        .bat-pct.med  { color: #ffb800; }
        .bat-pct.high { color: #3cdc64; }
        .bat-status {
            display: inline-block; font-size: 9.5px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; padding: 2px 8px; border-radius: 4px;
        }
        .bat-status.charging    { background: rgba(74,222,128,0.12); color: #3cdc64; }
        .bat-status.discharging { background: rgba(251,191,36,0.12); color: #ffb800; }
        .bat-status.notcharging { background: rgba(255,255,255,0.06); color: var(--text-dim); }
        .bat-status.full        { background: rgba(74,222,128,0.12); color: #3cdc64; }
        .bat-chart-wrap {
            margin-top: 8px; position: relative;
        }
        .bat-chart-wrap svg { display: block; width: 100%; height: 60px; }
        .bat-chart-label {
            display: flex; justify-content: space-between;
            font-size: 9px; color: var(--text-faint); margin-top: 2px;
        }
        .chrow .dem-active { color: #3cdc64; font-size: 9px; margin-left: 4px; }

        /* ── Radiosonde ────────────────────────────────────────────── */
        .sonde-bar {
            display: flex; align-items: center; justify-content: space-between;
            gap: 14px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 14px;
        }
        .sonde-bar.offline { opacity: 0.6; }
        .sonde-bar-id { display: flex; align-items: center; gap: 12px; }
        .sonde-recv-name {
            font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.4px;
        }
        .sonde-recv-meta {
            font-size: 10.5px; color: var(--text-faint);
            letter-spacing: 0.6px; text-transform: uppercase; margin-top: 3px;
        }
        .sonde-badge {
            font-size: 10px; font-weight: 700; letter-spacing: 1.3px;
            text-transform: uppercase; padding: 6px 13px; border-radius: 999px;
            white-space: nowrap; flex-shrink: 0;
        }
        .sonde-badge.dec  { background: var(--ok-bg);     color: var(--ok);     border: 1px solid rgba(74,222,128,0.30); }
        .sonde-badge.scan { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(96,165,250,0.30); }
        .sonde-badge.idle { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid var(--border); }
        .sonde-badge.off  { background: var(--err-bg);    color: var(--err);    border: 1px solid rgba(248,113,113,0.30); }

        .sonde-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 14px;
        }
        .sonde-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            position: relative; overflow: hidden;
        }
        .sonde-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
            background: var(--ok); opacity: 0.7;
        }
        .sonde-card-head {
            display: flex; align-items: baseline; justify-content: space-between;
            gap: 8px; margin-bottom: 12px;
        }
        .sonde-type {
            font-size: 10px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; color: var(--accent);
            background: var(--accent-dim); padding: 3px 8px; border-radius: 4px;
        }
        .sonde-serial {
            font-size: 12px; font-weight: 600; color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }
        .sonde-alt {
            font-size: 30px; font-weight: 800; color: #fff; line-height: 1;
            letter-spacing: -0.5px; font-variant-numeric: tabular-nums;
            margin-bottom: 14px;
        }
        .sonde-alt .u {
            font-size: 12px; font-weight: 500; color: var(--text-dim);
            margin-left: 6px; letter-spacing: 0.5px;
        }
        .sonde-stats {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 12px;
        }
        .sonde-stats .sl {
            font-size: 9px; font-weight: 700; letter-spacing: 1px;
            color: var(--text-faint); text-transform: uppercase; margin-bottom: 3px;
        }
        .sonde-stats .sv {
            font-size: 14px; font-weight: 700; color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .sonde-stats .sv.asc  { color: var(--ok);   }
        .sonde-stats .sv.desc { color: var(--warn); }
        .sonde-foot {
            display: flex; justify-content: space-between; gap: 8px;
            font-size: 10.5px; color: var(--text-faint);
            font-variant-numeric: tabular-nums;
            padding-top: 10px; border-top: 1px solid var(--border);
        }

        /* ── Footer ────────────────────────────────────────────────── */
        .footer {
            margin-top: 38px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 11px; color: var(--text-faint);
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;
        }
        .footer .live { display: inline-flex; align-items: center; gap: 6px; }

        .hidden { display: none !important; }

        @media (max-width: 640px) {
            body { padding: 18px 16px 30px; }
            .station-body { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-value { font-size: 15px; }
            .stations { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="brand">
        <div class="name">BEWE</div>
        <div class="tag">Behind Everyone We Hear Everything</div>
    </div>
    <div style="display:flex;gap:4px;">
        <a href="/">Home</a>
        <a href="/guide.html">Guide</a>
    </div>
</div>

<div class="header">
    <div class="header-left">
        <h1>SIGINT Operations Dashboard</h1>
        <div class="sub" id="last-update">Awaiting telemetry…</div>
    </div>
    <div id="central-pill" class="central-pill ok"><span class="pill-dot"></span><span id="central-status">CENTRAL ONLINE</span></div>
</div>

<!-- KPI strip -->
<div class="kpis" id="kpis"></div>

<!-- Stations -->
<div class="section-title">
    <span>Station List</span>
    <span class="count" id="stations-count">–</span>
</div>
<div class="stations" id="stations"></div>

<!-- Radiosonde -->
<div class="section-title">
    <span>Radiosonde Tracking</span>
    <span class="count" id="sonde-count">–</span>
</div>
<div id="sonde-panel"></div>

<!-- Flightradar24 -->
<div class="section-title">
    <span>Flightradar24 Feed</span>
    <span class="count" id="fr24-count">–</span>
</div>
<div id="fr24-panel"></div>

<!-- Central UPS Power -->
<style>
    .ups-bar {
        display: flex; align-items: center; justify-content: space-between; gap: 16px;
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 12px; padding: 16px 18px; flex-wrap: wrap;
    }
    .ups-bar.offline { opacity: .8; }
    .ups-id { display: flex; align-items: center; gap: 14px; min-width: 220px; }
    .ups-batt {
        position: relative; width: 62px; height: 30px; border: 2px solid var(--border-strong);
        border-radius: 5px; flex: none;
    }
    .ups-batt::after {
        content: ''; position: absolute; right: -6px; top: 8px; width: 4px; height: 12px;
        background: var(--border-strong); border-radius: 0 2px 2px 0;
    }
    .ups-batt-fill { position: absolute; inset: 3px; width: 0; border-radius: 2px; transition: width .5s ease, background .3s; }
    .ups-recv-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .ups-recv-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; letter-spacing: .3px; }
    .ups-metrics { display: flex; align-items: baseline; gap: 22px; }
    .ups-soc { font-size: 30px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }

    .ups-tip {

    }
    .ups-tip .t { color: var(--text-faint); font-size: 10px; margin-bottom: 4px; }
    .ups-tip .r { display: flex; justify-content: space-between; gap: 16px; line-height: 1.5; }
    .ups-ranges { display: flex; gap: 6px; }
    .ups-ranges button {
        background: var(--panel-strong); border: 1px solid var(--border); color: var(--text-dim);
        font-size: 10.5px; font-weight: 600; letter-spacing: .4px; padding: 3px 9px; border-radius: 6px; cursor: pointer;
    }
    .ups-ranges button.active { color: var(--ok); border-color: var(--ok); background: var(--ok-bg); }
    .ups-ranges button:hover { color: var(--text); }

    .ups-hint { font-size: 10px; color: var(--text-faint); margin-top: 6px; text-align: right; }
</style>
<div class="section-title">
    <span>Central UPS Power</span>
    <span class="count" id="ups-count">–</span>
</div>
<div id="ups-panel"></div>

<div class="footer">
    <span class="live"><span class="pill-dot" style="color:var(--ok);background:var(--ok)"></span> LIVE · auto-refresh every 3s</span>
    <span>BEWE Operations Console · 2026</span>
</div>

<script>
const POLL_MS = 3000;
const DETAIL_POLL_MS = 5000;
const SONDE_POLL_MS = 6000;
const UPS_POLL_MS = 15000;
const BAT_DETAIL_STATIONS = new Set(['DGS-2', 'DGS-2_DGS-2']);
const expanded = new Set();
const detailCache = new Map();
const detailTimers = new Map();
const batCache = new Map();
const batHistCache = new Map();
let notes = {};                // station_id -> { text, updatedAt }
const noteDirty = new Set();   // currently being edited — don't overwrite from server

// Static station display-name overrides (id → display name)
const STATION_DISPLAY = {
    'DGS-1': 'DGS-1 (Masan)',
    'DGS-2': 'DGS-2 (Changwon)',
    'DGS-3': 'DGS-3 (Daegu)',
};

function fmtFreqMHz(hz) {
    if (!hz || hz <= 0) return '—';
    return (hz / 1e6).toFixed(3) + ' MHz';
}
function fmtBwKHz(hz) {
    if (!hz || hz <= 0) return '—';
    return (hz / 1e3).toFixed(0) + ' kHz';
}
function fmtAge(ms) {
    if (ms == null) return '—';
    const s = Math.floor(ms / 1000);
    if (s < 5) return 'just now';
    if (s < 60) return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    return h + 'h ago';
}
function fmtCoord(lat, lon) {
    if (lat == null || lon == null || (lat === 0 && lon === 0)) return '';
    const ns = lat >= 0 ? 'N' : 'S';
    const ew = lon >= 0 ? 'E' : 'W';
    return Math.abs(lat).toFixed(3) + '° ' + ns + ' · ' + Math.abs(lon).toFixed(3) + '° ' + ew;
}
function fmtClock(unixSec) {
    if (!unixSec || unixSec <= 0) return '—';
    const d = new Date(unixSec * 1000);
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function fmtDuration(sec) {
    if (!sec || sec <= 0) return '—';
    if (sec < 60) return Math.round(sec) + 's';
    const m = Math.floor(sec / 60);
    if (m < 60) return m + 'm';
    return (sec / 3600).toFixed(1) + 'h';
}
const MODE_NAMES = ['—','AM','FM','—','—','—','—','—','—','—'];
function modeName(m) { return MODE_NAMES[m] || '—'; }
const SCHED_STATUS = { 0: ['idle','IDLE'], 1: ['armed','ARMED'], 2: ['active','RECORDING'], 3: ['done','DONE'] };
function schedStatus(s) { return SCHED_STATUS[s] || ['idle','—']; }

function renderKpis(data) {
    const stations = data.stations || [];
    const online = stations.filter(s => s.online);
    const totalAnalysts = online.reduce((a,s) => a + (s.users || 0), 0);
    const totalChannels = online.reduce((a,s) => a + (s.channel_count || 0), 0);
    const recCount = online.filter(s => s.hist_recording).length;
    const offlineCount = stations.length - online.length;

    const kpis = [
        { cls: online.length === stations.length && stations.length > 0 ? 'ok' : (online.length === 0 ? 'err' : 'warn'),
          lbl: 'Sites Active', val: online.length, sub: '/ ' + stations.length,
          note: offlineCount > 0 ? offlineCount + ' site(s) offline' : 'All sites operational' },
        { cls: totalAnalysts > 0 ? 'ok' : '',
          lbl: 'Analysts On Duty', val: totalAnalysts,
          note: totalAnalysts > 0 ? 'Live monitoring' : 'No analysts connected' },
        { cls: totalChannels > 0 ? 'ok' : '',
          lbl: 'Active Channels', val: totalChannels,
          note: 'Concurrent demodulation' },
        { cls: recCount > 0 ? 'ok' : '',
          lbl: 'Mission Recording', val: recCount,
          note: recCount > 0 ? 'Permanent archive active' : 'Standby' },
    ];

    document.getElementById('kpis').innerHTML = kpis.map(k => `
        <div class="kpi ${k.cls}">
            <div class="kpi-label">${k.lbl}</div>
            <div class="kpi-value">${k.val}${k.sub ? `<span class="sub">${k.sub}</span>` : ''}</div>
            <div class="kpi-note">${k.note}</div>
        </div>
    `).join('');
}

function renderStations(data) {
    // Don't rebuild station cards while a note is being edited — wipes focus / input.
    const active = document.activeElement;
    if (active && active.classList && active.classList.contains('note-input')) {
        return;
    }
    const stations = data.stations || [];
    document.getElementById('stations-count').textContent = stations.length + ' site(s)';

    if (stations.length === 0) {
        document.getElementById('stations').innerHTML = `
            <div style="grid-column:1/-1;background:var(--panel);border:1px dashed var(--border);border-radius:12px;padding:40px;text-align:center;color:var(--text-faint);font-size:13px;">
                No forward nodes registered.
            </div>`;
        return;
    }

    document.getElementById('stations').innerHTML = stations.map(s => {
        const isExp = expanded.has(s.station_id);
        const cls = (s.online ? '' : 'offline') + (isExp ? ' expanded' : '');
        const led = s.online ? 'led-on' : 'led-off';
        const tierLabel = s.tier ? `Tier ${s.tier}` : '';
        const ageStr = s.online ? 'LIVE' : fmtAge(s.ageMs);
        const noteText = (notes[s.station_id]?.text) || '';
        const noteMeta = notes[s.station_id]?.updatedAt
            ? `Updated ${fmtAge(Date.now() - notes[s.station_id].updatedAt)}` : '';
        return `
        <div class="station ${cls}" data-id="${s.station_id}">
            <div class="station-head" onclick="toggleStation('${s.station_id}', event)">
                <div>
                    <div class="station-id">
                        <span class="status-led ${led}"></span>
                        <span class="station-name">${escapeHtml(STATION_DISPLAY[s.name] || STATION_DISPLAY[s.station_id] || s.name || s.station_id)}</span>
                        ${s.hist_recording ? `<span class="station-rec"><span class="dot"></span>REC</span>` : ''}
                        ${(s.bat_pct >= 1 && s.bat_pct <= 100) ? `<span class="station-bat ${s.bat_pct <= 20 ? 'low' : s.bat_pct <= 50 ? 'med' : 'high'}">BAT ${s.bat_pct}%</span>` : ''}
                    </div>
                    <div class="station-meta">${tierLabel}${s.operator_login ? ' · operated by ' + escapeHtml(s.operator_login) : ''}</div>
                    <div class="station-coord">${fmtCoord(s.lat, s.lon)}</div>
                </div>
                <div class="station-summary">
                    <div class="age">${ageStr}</div>
                    <div class="chevron">&#9662;</div>
                </div>
            </div>
            <div class="station-body">
                <div class="stat">
                    <div class="stat-label">Analysts</div>
                    <div class="stat-value">${s.users || 0}</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Channels</div>
                    <div class="stat-value">${s.channel_count || 0}</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Center Freq</div>
                    <div class="stat-value" style="font-size:14px;">${fmtFreqMHz(s.center_freq_hz)}</div>
                </div>
            </div>
            <div class="note-wrap" onclick="event.stopPropagation()">
                <div class="note-label">
                    <span>Operator Note</span>
                    <span class="meta" id="note-meta-${cssId(s.station_id)}">${escapeHtml(noteMeta)}</span>
                </div>
                <textarea class="note-input" id="note-${cssId(s.station_id)}"
                    data-id="${s.station_id}"
                    rows="1"
                    maxlength="500"
                    oninput="onNoteInput(event)"
                    onkeydown="onNoteKey(event)"
                >${escapeHtml(noteText)}</textarea>
            </div>
            <div class="detail" id="detail-${cssId(s.station_id)}">
                ${renderDetail(s.station_id)}
            </div>
        </div>`;
    }).join('');

    // Auto-size textareas
    document.querySelectorAll('.note-input').forEach(autoResize);
}

function cssId(s) { return String(s).replace(/[^a-zA-Z0-9_-]/g, '_'); }
function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(200, el.scrollHeight) + 'px';
}

function renderDetail(id) {
    const d = detailCache.get(id);
    if (!d) return `<div class="detail-empty">Loading details…</div>`;

    let html = '';

    const batDetail = batCache.get(id);
    const batPct = batDetail?.bat_pct ?? d.bat_pct;
    if (batPct >= 1 && batPct <= 100) {
        const batCls = batPct <= 20 ? 'low' : batPct <= 50 ? 'med' : 'high';
        const statusRaw = (batDetail?.status || '').toLowerCase().replace(/\s+/g, '');
        const statusCls = statusRaw === 'charging' ? 'charging'
                        : statusRaw === 'discharging' ? 'discharging'
                        : statusRaw === 'full' ? 'full' : 'notcharging';
        const statusLabel = batDetail?.status || '';
        const hist = batHistCache.get(id) || [];
        const chartSvg = renderBatChart(hist);
        html += `<div class="detail-section detail-bat">
            <div class="detail-title">Host Battery</div>
            <div class="bat-row">
                <span class="bat-pct ${batCls}">${batPct}%</span>
                ${statusLabel ? `<span class="bat-status ${statusCls}">${escapeHtml(statusLabel)}</span>` : ''}
            </div>
            ${chartSvg}
        </div>`;
    }

    html += `<div class="detail-section">
        <div class="detail-title">Active Channels (${d.channels.length})</div>`;
    if (d.channels.length === 0) {
        html += `<div class="detail-empty">No active channels</div>`;
    } else {
        html += `<div class="chlist">`;
        for (const c of d.channels) {
            const center = ((c.s_mhz + c.e_mhz) / 2);
            const bw_kHz = ((c.e_mhz - c.s_mhz) * 1000);
            let rec = `<span class="chrec none">standby</span>`;
            if (c.iq_rec_on)          rec = `<span class="chrec iq">IQ REC</span>`;
            else if (c.audio_rec_on)  rec = `<span class="chrec audio">AUDIO REC</span>`;
            const owner = c.owner ? ` · ${escapeHtml(c.owner)}` : '';
            const demTag = c.dem_run ? `<span class="dem-active">▶</span>` : '';
            html += `<div class="chrow">
                <span class="chnum">${String(c.index + 1).padStart(2,'0')}</span>
                <span><span class="chmode">${modeName(c.mode)}</span><span class="chfreq">${center.toFixed(3)} MHz</span>${demTag}${owner}</span>
                <span style="color:var(--text-faint);font-size:11px;">${bw_kHz.toFixed(0)} kHz</span>
                ${rec}
            </div>`;
        }
        html += `</div>`;
    }
    html += `</div>`;

    html += `<div class="detail-section">
        <div class="detail-title">Connected Analysts (${d.joins.length})</div>`;
    if (d.joins.length === 0) {
        html += `<div class="detail-empty">No analysts connected</div>`;
    } else {
        html += `<div class="joins">`;
        for (const j of d.joins) {
            html += `<span class="join-pill"><span class="tier">T${j.tier}</span>${escapeHtml(j.name)}</span>`;
        }
        html += `</div>`;
    }
    html += `</div>`;

    const armed = d.scheds.filter(s => s.valid);
    html += `<div class="detail-section">
        <div class="detail-title">Scheduled Missions (${armed.length})</div>`;
    if (armed.length === 0) {
        html += `<div class="detail-empty">No scheduled missions</div>`;
    } else {
        html += `<div class="schedlist">`;
        for (const s of armed) {
            const [cls, lbl] = schedStatus(s.status);
            const tgt = s.target ? ` → ${escapeHtml(s.target)}` : '';
            html += `<div class="schedrow">
                <span class="schnum">#${(s.op_index || 0) + 1}</span>
                <span><span class="schfreq">${s.freq_mhz.toFixed(3)} MHz</span>${tgt}</span>
                <span style="color:var(--text-faint);font-size:11px;">${fmtClock(s.start_time)} · ${fmtDuration(s.duration_sec)}</span>
                <span class="schstatus ${cls}">${lbl}</span>
            </div>`;
        }
        html += `</div>`;
    }
    html += `</div>`;

    if (d.hist) {
        const elapsed = (Math.floor(Date.now() / 1000) - d.hist.start_utc_unix);
        html += `<div class="detail-section">
            <div class="detail-title">Mission Archive (HIST)</div>
            <div class="hist-info">
                <div class="hist-item"><div class="lbl">Started</div><div class="val">${fmtClock(d.hist.start_utc_unix)}</div></div>
                <div class="hist-item"><div class="lbl">Elapsed</div><div class="val">${fmtDuration(elapsed)}</div></div>
                <div class="hist-item"><div class="lbl">Center Freq</div><div class="val">${fmtFreqMHz(d.hist.center_freq_hz)}</div></div>
                <div class="hist-item"><div class="lbl">Bandwidth</div><div class="val">${fmtBwKHz(d.hist.sample_rate_hz)}</div></div>
            </div>
        </div>`;
    }
    return html;
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

window.toggleStation = function(id, ev) {
    if (ev && (ev.target.tagName === 'TEXTAREA' || ev.target.closest('.note-wrap'))) return;
    if (expanded.has(id)) {
        expanded.delete(id);
        if (detailTimers.has(id)) { clearInterval(detailTimers.get(id)); detailTimers.delete(id); }
    } else {
        expanded.add(id);
        fetchDetail(id);
        if (BAT_DETAIL_STATIONS.has(id)) fetchBatDetail(id);
        detailTimers.set(id, setInterval(() => fetchDetail(id), DETAIL_POLL_MS));
    }
    const card = document.querySelector(`.station[data-id="${id}"]`);
    if (card) {
        card.classList.toggle('expanded', expanded.has(id));
        const detail = card.querySelector('.detail');
        if (detail) detail.innerHTML = renderDetail(id);
    }
};

async function fetchDetail(id) {
    try {
        const r = await fetch('/api/station/' + encodeURIComponent(id) + '/detail');
        if (!r.ok) return;
        const d = await r.json();
        detailCache.set(id, d);
        if (BAT_DETAIL_STATIONS.has(id)) fetchBatDetail(id);
        const card = document.querySelector(`.station[data-id="${id}"]`);
        if (card && card.classList.contains('expanded')) {
            const detail = card.querySelector('.detail');
            if (detail) detail.innerHTML = renderDetail(id);
        }
    } catch (e) { /* silent */ }
}

async function fetchBatDetail(id) {
    try {
        const [rb, rh] = await Promise.all([
            fetch('/api/battery/' + encodeURIComponent(id)),
            fetch('/api/battery/' + encodeURIComponent(id) + '/history'),
        ]);
        if (rb.ok) batCache.set(id, await rb.json());
        if (rh.ok) batHistCache.set(id, await rh.json());
        const card = document.querySelector(`.station[data-id="${id}"]`);
        if (card && card.classList.contains('expanded')) {
            const detail = card.querySelector('.detail');
            if (detail) detail.innerHTML = renderDetail(id);
        }
    } catch (e) { /* silent */ }
}

function renderBatChart(hist) {
    if (!hist || hist.length < 2) {
        return `<div class="bat-chart-wrap"><div style="font-size:11px;color:var(--text-faint);padding:8px 0;">Collecting data… (30 min intervals)</div></div>`;
    }
    const W = 400, H = 60, PAD = 4;
    const now = Date.now();
    const t0 = now - 24 * 60 * 60 * 1000;
    const pts = hist.filter(p => p.ts >= t0 && p.bat_pct != null);
    if (pts.length < 2) {
        return `<div class="bat-chart-wrap"><div style="font-size:11px;color:var(--text-faint);padding:8px 0;">Collecting data… (30 min intervals)</div></div>`;
    }
    const xOf = p => PAD + ((p.ts - t0) / (now - t0)) * (W - PAD * 2);
    const yOf = p => PAD + (1 - (p.bat_pct / 100)) * (H - PAD * 2);
    const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${xOf(p).toFixed(1)},${yOf(p).toFixed(1)}`).join(' ');
    const area = `${line} L${xOf(pts[pts.length-1]).toFixed(1)},${H} L${xOf(pts[0]).toFixed(1)},${H} Z`;
    const first = pts[0], last = pts[pts.length - 1];
    const hrsAgo = Math.round((now - first.ts) / 36e5);
    return `<div class="bat-chart-wrap">
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
            <defs>
                <linearGradient id="batGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#3cdc64" stop-opacity="0.25"/>
                    <stop offset="100%" stop-color="#3cdc64" stop-opacity="0.02"/>
                </linearGradient>
            </defs>
            <path d="${area}" fill="url(#batGrad)"/>
            <path d="${line}" fill="none" stroke="#3cdc64" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
            <circle cx="${xOf(last).toFixed(1)}" cy="${yOf(last).toFixed(1)}" r="2.5" fill="#3cdc64"/>
        </svg>
        <div class="bat-chart-label">
            <span>${hrsAgo}h ago</span>
            <span>24h trend · ${pts.length} samples</span>
            <span>now</span>
        </div>
    </div>`;
}

// ── Notes ──────────────────────────────────────────────────────────
window.onNoteInput = function(e) {
    const id = e.target.dataset.id;
    const saved = (notes[id]?.text) || '';
    if (e.target.value !== saved) {
        noteDirty.add(id);
        setMeta(id, 'unsaved · press Enter to save', '');
    } else {
        noteDirty.delete(id);
        const meta = notes[id]?.updatedAt
            ? `Updated ${fmtAge(Date.now() - notes[id].updatedAt)}` : '';
        setMeta(id, meta, '');
    }
    autoResize(e.target);
};
window.onNoteKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        saveNote(e.target.dataset.id);
        e.target.blur();
    } else if (e.key === 'Escape') {
        // Revert to saved value, cancel edit
        const id = e.target.dataset.id;
        e.target.value = (notes[id]?.text) || '';
        noteDirty.delete(id);
        autoResize(e.target);
        const meta = notes[id]?.updatedAt
            ? `Updated ${fmtAge(Date.now() - notes[id].updatedAt)}` : '';
        setMeta(id, meta, '');
        e.target.blur();
    }
};
function setMeta(id, text, cls) {
    const el = document.getElementById('note-meta-' + cssId(id));
    if (!el) return;
    el.textContent = text;
    el.className = 'meta' + (cls ? ' ' + cls : '');
}
async function saveNote(id) {
    const ta = document.getElementById('note-' + cssId(id));
    if (!ta) return;
    const text = ta.value;
    setMeta(id, 'saving…', 'saving');
    try {
        const r = await fetch('/api/notes/' + encodeURIComponent(id), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        });
        if (!r.ok) throw new Error('save failed');
        const j = await r.json();
        if (j.note) notes[id] = j.note; else delete notes[id];
        noteDirty.delete(id);
        setMeta(id, 'saved · just now', 'saved');
    } catch (e) {
        setMeta(id, 'save failed', 'err');
    }
}

async function fetchNotes() {
    try {
        const r = await fetch('/api/notes');
        if (!r.ok) return;
        const fresh = await r.json();
        notes = fresh;
        // Update any non-dirty textareas with fresh server text
        document.querySelectorAll('.note-input').forEach(ta => {
            const id = ta.dataset.id;
            if (noteDirty.has(id)) return;
            const remoteText = (notes[id]?.text) || '';
            if (ta.value !== remoteText) {
                ta.value = remoteText;
                autoResize(ta);
            }
            const meta = notes[id]?.updatedAt
                ? `Updated ${fmtAge(Date.now() - notes[id].updatedAt)}` : '';
            setMeta(id, meta, '');
        });
    } catch (e) { /* silent */ }
}

// ── Radiosonde ──────────────────────────────────────────────────────
function renderSonde(d) {
    const panel = document.getElementById('sonde-panel');
    const countEl = document.getElementById('sonde-count');
    if (!panel) return;

    if (!d || !d.reachable) {
        if (countEl) countEl.textContent = 'receiver offline';
        panel.innerHTML = `
            <div class="sonde-bar offline">
                <div class="sonde-bar-id">
                    <span class="status-led led-off"></span>
                    <div>
                        <span class="sonde-recv-name">DGS-2 Receiver</span>
                        <div class="sonde-recv-meta">Radiosonde decoder · auto_rx</div>
                    </div>
                </div>
                <span class="sonde-badge off">Offline</span>
            </div>
            <div class="detail-empty" style="padding:8px 2px;">auto_rx is unreachable — the sonde receiver on DGS-2 may be down.</div>`;
        return;
    }

    const sondes = d.sondes || [];
    const n = sondes.length;
    if (countEl) countEl.textContent = n > 0 ? (n + ' in range') : 'standby';

    const range = (d.scan_min_mhz && d.scan_max_mhz)
        ? (Number(d.scan_min_mhz).toFixed(2) + '–' + Number(d.scan_max_mhz).toFixed(2) + ' MHz')
        : '400–406 MHz';
    const sdr = d.sdr_type === 'RTLSDR' ? 'RTL-SDR' : (d.sdr_type || 'RTL-SDR');
    const ver = d.version ? (' · auto_rx ' + d.version) : '';

    let state, scls;
    if (n > 0)           { state = 'Decoding'; scls = 'dec'; }
    else if (d.scanning) { state = 'Scanning'; scls = 'scan'; }
    else                 { state = 'Idle';     scls = 'idle'; }

    let html = `
        <div class="sonde-bar">
            <div class="sonde-bar-id">
                <span class="status-led led-on"></span>
                <div>
                    <span class="sonde-recv-name">DGS-2 Receiver</span>
                    <div class="sonde-recv-meta">${escapeHtml(sdr)} · scan ${range}${ver}</div>
                </div>
            </div>
            <span class="sonde-badge ${scls}">${state}</span>
        </div>`;

    if (n === 0) {
        html += `<div class="detail-empty" style="padding:8px 2px;">No radiosonde in range — scanning the ${range} band for new launches.</div>`;
    } else {
        html += '<div class="sonde-grid">' + sondes.map(s => {
            const climb = s.vel_v;
            const climbCls = climb == null ? '' : (climb >= 0 ? 'asc' : 'desc');
            const climbTxt = climb == null ? '—' : ((climb >= 0 ? '+' : '') + climb.toFixed(1) + ' m/s');
            const altTxt = s.alt == null ? '—' : Math.round(s.alt).toLocaleString('en-US') + ' m';
            const pos = (s.lat != null && s.lon != null) ? fmtCoord(s.lat, s.lon) : '—';
            const label = (s.type || 'Sonde') + (s.subtype ? (' ' + s.subtype) : '');
            return `
            <div class="sonde-card">
                <div class="sonde-card-head">
                    <span class="sonde-type">${escapeHtml(label)}</span>
                    <span class="sonde-serial">${escapeHtml(s.serial)}</span>
                </div>
                <div class="sonde-alt">${altTxt}<span class="u">altitude</span></div>
                <div class="sonde-stats">
                    <div><div class="sl">Climb</div><div class="sv ${climbCls}">${climbTxt}</div></div>
                    <div><div class="sl">Freq</div><div class="sv" style="font-size:12px;">${escapeHtml(s.freq || '—')}</div></div>
                    <div><div class="sl">Sats</div><div class="sv">${s.sats == null ? '—' : s.sats}</div></div>
                </div>
                <div class="sonde-foot">
                    <span>${pos}</span>
                    <span>${fmtAge(s.ageMs)}</span>
                </div>
            </div>`;
        }).join('') + '</div>';
    }
    panel.innerHTML = html;
}

async function pollSonde() {
    try {
        const r = await fetch('/api/sonde');
        if (!r.ok) throw new Error('sonde unreachable');
        renderSonde(await r.json());
    } catch (e) {
        renderSonde(null);
    }
}

// ── Central UPS Power ────────────────────────────────────────────────
function upsColors() {
    const cs = getComputedStyle(document.documentElement);
    const g = n => (cs.getPropertyValue(n) || '').trim() || '#888888';
    return { ok: g('--ok'), warn: g('--warn'), accent: g('--accent'),
        border: g('--border'), text: g('--text'), dim: g('--text-dim'), faint: g('--text-faint') };
}
function upsHexA(hex, a) {
    hex = String(hex).replace('#', '');
    if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
    const n = parseInt(hex, 16);
    if (!isFinite(n)) return `rgba(136,136,136,${a})`;
    return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
}
function upsClock(t)  { const d = new Date(t); return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
function upsClockS(t) { const d = new Date(t); return upsClock(t) + ':' + String(d.getSeconds()).padStart(2,'0'); }

const GAP_MS = 150 * 1000;   // >2.5min between samples = downtime/off (grey gap)

const upsChart = {
    cv: null, ctx: null, tip: null, data: [], W: 600, H: 190, dpr: 1,
    span: 24 * 3600 * 1000, follow: true, start: 0, end: 0, hoverX: null, drag: null, _ro: null,

    init(canvas, tip) {
        this.cv = canvas; this.tip = tip; this.ctx = canvas.getContext('2d');
        if (this._ro) this._ro.disconnect();
        this._ro = new ResizeObserver(() => { this.fit(); this.draw(); });
        this._ro.observe(canvas.parentElement);
        canvas.onmousemove = e => { const r = this.cv.getBoundingClientRect(); this.hoverX = e.clientX - r.left; this.draw(); };
        canvas.onmouseleave = () => { this.hoverX = null; this.tip.style.opacity = 0; this.draw(); };
        canvas.onwheel = e => this.onWheel(e);
        canvas.onmousedown = e => { const w = this.win(); this.drag = { x: e.clientX, a: w[0], b: w[1] }; };
        canvas.ondblclick = () => { this.follow = true; this.span = 24 * 3600 * 1000; this.draw(); };
        if (!this._bound) {
            window.addEventListener('mouseup', () => { this.drag = null; });
            window.addEventListener('mousemove', e => this.onDragMove(e));
            this._bound = true;
        }
        this.fit();
    },
    fit() {
        const w = (this.cv.parentElement && this.cv.parentElement.clientWidth) || 600;
        this.dpr = window.devicePixelRatio || 1;
        this.W = w; this.H = 190;
        this.cv.width = Math.round(w * this.dpr); this.cv.height = Math.round(this.H * this.dpr);
    },
    setData(series) { this.data = (series || []).filter(s => isFinite(s.t) && isFinite(s.soc)); this.draw(); },
    setSpan(ms) { this.follow = true; this.span = ms; this.draw(); },
    win() {
        const d = this.data; if (!d.length) return [0, 1];
        const firstT = d[0].t, lastT = d[d.length - 1].t;
        if (this.follow) return [Math.max(firstT, lastT - this.span), lastT];
        return [Math.max(firstT, this.start), Math.min(lastT, this.end)];
    },
    clampView() {
        if (!this.data.length) return;
        const f = this.data[0].t, l = this.data[this.data.length - 1].t;
        let s = this.start, e = this.end, sp = e - s;
        if (s < f) { s = f; e = f + sp; }
        if (e > l) { e = l; s = l - sp; }
        if (s < f) s = f;
        this.start = s; this.end = e;
    },
    onWheel(e) {
        e.preventDefault();
        const r = this.cv.getBoundingClientRect(), px = e.clientX - r.left;
        const [a, b] = this.win(), sp = b - a, padL = 6, plotW = this.W - 12;
        const tc = a + (px - padL) / plotW * sp, f = e.deltaY < 0 ? 0.8 : 1.25;
        const ns = Math.max(5 * 60 * 1000, Math.min(24 * 3600 * 1000, sp * f));
        const ratio = (tc - a) / sp;
        this.follow = false; this.start = tc - ratio * ns; this.end = this.start + ns;
        this.clampView(); this.draw();
    },
    onDragMove(e) {
        if (!this.drag) return;
        const plotW = this.W - 12, sp = this.drag.b - this.drag.a;
        const dt = -(e.clientX - this.drag.x) / plotW * sp;
        this.follow = false; this.start = this.drag.a + dt; this.end = this.drag.b + dt;
        this.clampView(); this.draw();
    },
    draw() {
        const ctx = this.ctx; if (!ctx) return;
        const W = this.W, H = this.H, dpr = this.dpr, C = upsColors();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0); ctx.clearRect(0, 0, W, H);
        const padL = 6, padR = 6, padT = 10, padB = 18, plotW = W - padL - padR, plotH = H - padT - padB;
        const d = this.data;
        if (d.length < 2) { ctx.fillStyle = C.faint; ctx.font = '12px sans-serif'; ctx.fillText('collecting samples…', padL, padT + 16); return; }
        const [a, b] = this.win(), span = Math.max(1, b - a);
        const X = t => padL + (t - a) / span * plotW;
        const Y = s => padT + (1 - Math.max(0, Math.min(100, s)) / 100) * plotH;

        // Y grid
        ctx.font = '9px sans-serif'; ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
        for (const g of [0, 25, 50, 75, 100]) {
            const yy = Y(g);
            ctx.strokeStyle = C.border; ctx.lineWidth = 1; ctx.setLineDash(g === 0 || g === 100 ? [] : [3, 4]);
            ctx.beginPath(); ctx.moveTo(padL, yy + 0.5); ctx.lineTo(W - padR, yy + 0.5); ctx.stroke();
            ctx.fillStyle = C.faint; ctx.fillText(g + '%', padL + 2, yy - 2);
        }
        ctx.setLineDash([]);
        // X grid + time labels
        const N = 5;
        for (let i = 0; i <= N; i++) {
            const t = a + span * i / N, xx = X(t);
            ctx.strokeStyle = C.border; ctx.globalAlpha = 0.4;
            ctx.beginPath(); ctx.moveTo(xx + 0.5, padT); ctx.lineTo(xx + 0.5, H - padB); ctx.stroke(); ctx.globalAlpha = 1;
            ctx.fillStyle = C.faint; ctx.textAlign = i === 0 ? 'left' : (i === N ? 'right' : 'center');
            ctx.fillText(upsClock(t), Math.min(Math.max(xx, padL), W - padR), H - padB + 11);
        }
        ctx.textAlign = 'left';

        const vis = d.filter(p => p.t >= a - span * 0.03 && p.t <= b + span * 0.03);
        // segments: colour by ac state; grey flat line across data gaps (downtime/off)
        for (let i = 1; i < vis.length; i++) {
            const p0 = vis[i - 1], p1 = vis[i];
            if ((p1.t - p0.t) > GAP_MS) {
                const x0 = X(p0.t), x1 = X(p1.t), yy = Y(p0.soc);
                ctx.fillStyle = 'rgba(150,150,150,0.10)'; ctx.fillRect(x0, padT, x1 - x0, plotH);
                ctx.strokeStyle = C.faint; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo(x0, yy); ctx.lineTo(x1, yy); ctx.stroke(); ctx.setLineDash([]);
                continue;
            }
            const col = p1.ac === 0 ? C.warn : (p1.ac === 1 ? C.ok : C.accent);
            ctx.beginPath();
            ctx.moveTo(X(p0.t), Y(p0.soc)); ctx.lineTo(X(p1.t), Y(p1.soc));
            ctx.lineTo(X(p1.t), H - padB); ctx.lineTo(X(p0.t), H - padB); ctx.closePath();
            ctx.fillStyle = upsHexA(col, 0.14); ctx.fill();
            ctx.beginPath(); ctx.moveTo(X(p0.t), Y(p0.soc)); ctx.lineTo(X(p1.t), Y(p1.soc));
            ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();
        }
        const last = vis[vis.length - 1];
        if (last) {
            const col = last.ac === 0 ? C.warn : (last.ac === 1 ? C.ok : C.accent);
            ctx.beginPath(); ctx.arc(X(last.t), Y(last.soc), 3, 0, 7); ctx.fillStyle = col; ctx.fill();
        }

        // hover crosshair + tooltip
        if (this.hoverX != null) {
            const t = a + (this.hoverX - padL) / plotW * span;
            let best = null, bd = 1e18;
            for (const p of vis) { const dd = Math.abs(p.t - t); if (dd < bd) { bd = dd; best = p; } }
            if (best) {
                const hx = X(best.t), hy = Y(best.soc);
                ctx.strokeStyle = C.dim; ctx.setLineDash([2, 3]); ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(hx + 0.5, padT); ctx.lineTo(hx + 0.5, H - padB); ctx.stroke(); ctx.setLineDash([]);
                ctx.beginPath(); ctx.arc(hx, hy, 3.5, 0, 7); ctx.fillStyle = C.text; ctx.fill();
                const st = best.ac === 1 ? 'Charging' : (best.ac === 0 ? 'On battery' : 'AC unknown');
                this.tip.innerHTML = `<div class="t">${upsClockS(best.t)}</div>` +
                    `<div class="r"><span>Charge</span><b>${best.soc.toFixed(1)}%</b></div>` +
                    `<div class="r"><span>Voltage</span><b>${(best.volt || 0).toFixed(2)} V</b></div>` +
                    `<div class="r"><span>State</span><b>${st}</b></div>`;
                this.tip.style.opacity = 1;
                const tw = this.tip.offsetWidth, th = this.tip.offsetHeight;
                let lx = hx + 12; if (lx + tw > W) lx = hx - 12 - tw; if (lx < 0) lx = 4;
                let ly = hy - th - 8; if (ly < 0) ly = hy + 12;
                this.tip.style.left = lx + 'px'; this.tip.style.top = ly + 'px';
            }
        }
    },
};

let upsBuilt = false;
function renderUps(d) {
    const panel = document.getElementById('ups-panel');
    const countEl = document.getElementById('ups-count');
    if (!panel) return;

    if (!d || !d.reachable || !d.latest) {
        upsBuilt = false;
        if (countEl) countEl.textContent = 'logger offline';
        panel.innerHTML = `
            <div class="ups-bar offline">
                <div class="ups-id">
                    <div class="ups-batt"><div class="ups-batt-fill" style="background:var(--err)"></div></div>
                    <div>
                        <span class="ups-recv-name">raspb2 · X1200 UPS</span>
                        <div class="ups-recv-meta">battery logger unreachable</div>
                    </div>
                </div>
                <span class="ups-badge off">Offline</span>
            </div>`;
        return;
    }

    const L = d.latest;
    const charging = L.ac === 1, onBatt = L.ac === 0;
    const soc = Math.max(0, Math.min(100, L.soc));
    const col = charging ? 'var(--ok)' : (onBatt ? 'var(--warn)' : 'var(--accent)');
    let badge, bcls;
    if (charging)     { badge = '⚡ Charging';  bcls = 'chg';  }
    else if (onBatt)  { badge = 'On Battery';   bcls = 'batt'; }
    else              { badge = 'AC Unknown';   bcls = 'unk';  }
    if (countEl) countEl.textContent = charging ? 'charging' : (onBatt ? 'on battery' : 'AC unknown');

    if (!upsBuilt) {
        panel.innerHTML = `
            <div class="ups-bar">
                <div class="ups-id">
                    <div class="ups-batt"><div class="ups-batt-fill" id="ups-fill"></div></div>
                    <div>
                        <span class="ups-recv-name">raspb2 · X1200 UPS</span>
                        <div class="ups-recv-meta">Central power backup · MAX17040 fuel gauge</div>
                    </div>
                </div>
                <div class="ups-metrics">
                    <div class="ups-soc" id="ups-socbox"><span id="ups-socv">—</span><span class="u">%</span></div>
                    <div class="ups-volt" id="ups-voltbox">—</div>
                </div>
                <span class="ups-badge" id="ups-badge">—</span>
            </div>
            <div class="ups-chart">
                <div class="ups-chart-head">
                    <div class="ups-ranges">
                        <button data-h="1">1h</button><button data-h="6">6h</button>
                        <button data-h="24" class="active">24h</button><button data-h="0">All</button>
                    </div>
                    <div class="ups-legend">
                        <span><i style="background:var(--ok)"></i>charging</span>
                        <span><i style="background:var(--warn)"></i>on battery</span>
                        <span><i style="background:var(--text-faint)"></i>offline / down</span>
                    </div>
                </div>
                <div class="ups-canvas-wrap"><canvas id="ups-canvas"></canvas><div class="ups-tip" id="ups-tip"></div></div>
                <div class="ups-hint">wheel = zoom · drag = pan · double-click = reset</div>
            </div>`;
        upsChart.init(document.getElementById('ups-canvas'), document.getElementById('ups-tip'));
        panel.querySelectorAll('.ups-ranges button').forEach(btn => {
            btn.onclick = () => {
                panel.querySelectorAll('.ups-ranges button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const h = +btn.dataset.h;
                if (h === 0) { upsChart.follow = true; upsChart.span = 1e15; upsChart.draw(); }
                else upsChart.setSpan(h * 3600 * 1000);
            };
        });
        upsBuilt = true;
    }

    document.getElementById('ups-socv').textContent = soc.toFixed(1);
    document.getElementById('ups-socbox').style.color = col;
    document.getElementById('ups-voltbox').textContent = isFinite(L.volt) ? L.volt.toFixed(2) + ' V' : '—';
    const bd = document.getElementById('ups-badge'); bd.className = 'ups-badge ' + bcls; bd.textContent = badge;
    const fill = document.getElementById('ups-fill'); fill.style.width = soc + '%'; fill.style.background = col;

    upsChart.setData(d.series || []);
}

async function pollUps() {
    try {
        const r = await fetch('/api/ups');
        if (!r.ok) throw new Error('ups unreachable');
        renderUps(await r.json());
    } catch (e) {
        renderUps(null);
    }
}

// ── Flightradar24 ───────────────────────────────────────────────────
function renderFr24(d) {
    const panel = document.getElementById('fr24-panel');
    const countEl = document.getElementById('fr24-count');
    if (!panel) return;

    if (!d || !d.reachable) {
        if (countEl) countEl.textContent = 'feeder offline';
        panel.innerHTML = `
            <div class="sonde-bar offline">
                <div class="sonde-bar-id">
                    <span class="status-led led-off"></span>
                    <div>
                        <span class="sonde-recv-name">DGS-2 Feeder</span>
                        <div class="sonde-recv-meta">ADS-B feeder · fr24feed</div>
                    </div>
                </div>
                <span class="sonde-badge off">Offline</span>
            </div>
            <div class="detail-empty" style="padding:8px 2px;">fr24feed is unreachable — the ADS-B feeder on DGS-2 may be down.</div>`;
        return;
    }

    const n = d.ac_tracked ?? 0;
    if (countEl) countEl.textContent = n > 0 ? (n + ' aircraft') : 'standby';

    const feeding = d.feed_status === 'connected';
    let state, scls;
    if (feeding)             { state = 'Feeding'; scls = 'dec'; }
    else if (d.rx_connected) { state = 'RX only'; scls = 'scan'; }
    else                     { state = 'Idle';    scls = 'idle'; }

    const alias = d.alias ? (' · ' + d.alias) : '';
    const ver = d.version ? (' · fr24feed ' + d.version) : '';
    const lastSent = d.last_ac_sent ? fmtAge(Date.now() - d.last_ac_sent * 1000) : '—';
    const nonAdsb = (d.ac_tracked != null && d.ac_adsb != null) ? (d.ac_tracked - d.ac_adsb) : null;

    panel.innerHTML = `
        <div class="sonde-bar">
            <div class="sonde-bar-id">
                <span class="status-led led-on"></span>
                <div>
                    <span class="sonde-recv-name">DGS-2 Feeder</span>
                    <div class="sonde-recv-meta">ADS-B 1090 MHz${escapeHtml(alias)}${escapeHtml(ver)}</div>
                </div>
            </div>
            <span class="sonde-badge ${scls}">${state}</span>
        </div>
        <div class="sonde-grid">
            <div class="sonde-card">
                <div class="sonde-card-head">
                    <span class="sonde-type">Feed</span>
                    <span class="sonde-serial">${escapeHtml(d.mode || '—')}</span>
                </div>
                <div class="sonde-alt">${n}<span class="u">aircraft tracked</span></div>
                <div class="sonde-stats">
                    <div><div class="sl">ADS-B</div><div class="sv">${d.ac_adsb ?? '—'}</div></div>
                    <div><div class="sl">Other</div><div class="sv">${nonAdsb ?? '—'}</div></div>
                    <div><div class="sl">Msgs</div><div class="sv">${d.messages == null ? '—' : d.messages.toLocaleString('en-US')}</div></div>
                </div>
                <div class="sonde-foot">
                    <span>${feeding ? 'feed.fr24.com connected' : 'feed disconnected'}</span>
                    <span>sent ${lastSent}</span>
                </div>
            </div>
        </div>`;
}

async function pollFr24() {
    try {
        const r = await fetch('/api/fr24');
        if (!r.ok) throw new Error('fr24 unreachable');
        renderFr24(await r.json());
    } catch (e) {
        renderFr24(null);
    }
}

async function poll() {
    try {
        const r = await fetch('/api/status');
        if (!r.ok) throw new Error('status unreachable');
        const data = await r.json();
        const pill = document.getElementById('central-pill');
        const ptxt = document.getElementById('central-status');
        if (data.central?.reachable) {
            pill.className = 'central-pill ok';
            ptxt.textContent = 'CENTRAL ONLINE';
        } else {
            pill.className = 'central-pill err';
            ptxt.textContent = 'CENTRAL OFFLINE';
        }
        renderKpis(data);
        renderStations(data);
        const now = new Date();
        document.getElementById('last-update').textContent =
            'Last update: ' + String(now.getHours()).padStart(2,'0') + ':' +
            String(now.getMinutes()).padStart(2,'0') + ':' +
            String(now.getSeconds()).padStart(2,'0');
    } catch (e) {
        const pill = document.getElementById('central-pill');
        pill.className = 'central-pill err';
        document.getElementById('central-status').textContent = 'NO RESPONSE';
    }
}

// Initial load: fetch notes once (no polling — refresh page to see others' edits),
// then poll status only.
(async function init() {
    await fetchNotes();
    await poll();
    setInterval(poll, POLL_MS);
    pollSonde();
    setInterval(pollSonde, SONDE_POLL_MS);
    pollFr24();
    setInterval(pollFr24, SONDE_POLL_MS);
    pollUps();
    setInterval(pollUps, UPS_POLL_MS);
})();
</script>
