<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEWE</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; background: #000; color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', 'Noto Sans KR', sans-serif;
            display: flex; align-items: center; justify-content: center; padding: 24px 16px;
        }
        body.app-mode { align-items: flex-start; }   /* logged-in: top-aligned wide app */
        a { color: #60a5fa; }
        .card {
            width: 100%; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 24px;
        }
        .card.auth { max-width: 440px; }
        .card.app  { max-width: 1120px; padding: 22px 26px; }
        h1 { margin: 0 0 4px; font-size: 22px; font-weight: 700; color: #fff; letter-spacing: .5px; }
        h1.brand { text-align: center; font-size: 26px; font-weight: 800; letter-spacing: 5px; margin: 4px 0 24px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 18px; }
        .tab {
            flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 500;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: none; color: rgba(255,255,255,0.55);
        }
        .tab.active { background: rgba(59,130,246,0.25); border-color: rgba(59,130,246,0.6); color: #fff; }
        label { display: block; font-size: 12px; color: rgba(148,163,184,0.9); margin: 12px 0 5px; }
        input, textarea {
            width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #fff;
        }
        textarea { resize: vertical; min-height: 150px; line-height: 1.5; }
        input:focus, textarea:focus { outline: none; border-color: rgba(59,130,246,0.7); }
        .suffix { font-size: 12px; color: rgba(148,163,184,0.7); margin-top: 4px; }
        button.primary {
            padding: 10px 18px; font-size: 14px; font-weight: 600; font-family: inherit; white-space: nowrap;
            color: #fff; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border: none; border-radius: 8px; cursor: pointer;
        }
        button.primary.full { width: 100%; margin-top: 18px; padding: 11px; }
        button.primary:hover { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        button:disabled { opacity: .5; cursor: not-allowed; }
        .msg { margin-top: 12px; font-size: 13px; min-height: 18px; }
        .msg.err { color: #f87171; }
        .msg.ok  { color: #4ade80; }
        .hidden { display: none !important; }
        .email-badge { font-family: monospace; font-size: 15px; color: #93c5fd; }
        .status-pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }
        .linkbtn { background: none; border: none; color: #60a5fa; cursor: pointer; font-size: 13px; font-family: inherit; padding: 0; }
        hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 16px 0; }
        .pending-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; font-size: 13px; }
        .acts { display: flex; gap: 6px; }
        .mini { padding: 5px 10px; font-size: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); background: none; color: #e0e0e0; cursor: pointer; font-family: inherit; }
        .mini.approve { border-color: rgba(74,222,128,0.5); color: #4ade80; }
        .mini.reject  { border-color: rgba(248,113,113,0.5); color: #f87171; }
        .section-title { font-size: 13px; font-weight: 600; color: #fff; margin: 0 0 6px; }

        /* logged-in header */
        .app-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .head-actions { display: flex; align-items: center; gap: 14px; }
        .btn-ghost { padding: 7px 14px; font-size: 13px; font-family: inherit; cursor: pointer; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; background: none; color: rgba(255,255,255,0.7); }
        .btn-ghost:hover { color: #fff; border-color: rgba(255,255,255,0.25); }
        .btn-ghost.on { background: rgba(59,130,246,0.2); border-color: rgba(59,130,246,0.5); color: #fff; }

        /* toolbar */
        .toolbar { display: flex; align-items: center; gap: 8px; margin: 16px 0 12px; }
        .boxbtn {
            padding: 7px 16px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: none; color: rgba(255,255,255,0.6);
        }
        .boxbtn.active { background: rgba(59,130,246,0.22); border-color: rgba(59,130,246,0.55); color: #fff; }
        .badge-count { display: inline-block; margin-left: 6px; padding: 0 6px; font-size: 11px; border-radius: 999px; background: #2563eb; color: #fff; }

        /* master-detail layout */
        .mail-layout { display: grid; grid-template-columns: 340px minmax(0, 1fr); gap: 16px; align-items: start; }
        .maillist { border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; overflow-y: auto; max-height: 66vh; }
        .mailitem { display: flex; gap: 10px; padding: 13px 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .mailitem:last-child { border-bottom: none; }
        .mailitem:hover { background: rgba(255,255,255,0.03); }
        .mailitem.active { background: rgba(59,130,246,0.14); }
        .mailitem.unseen .mi-sub { font-weight: 700; color: #fff; }
        .mailitem.unseen::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: #3b82f6; margin-top: 6px; flex: none; }
        .mailitem.seen::before { content: ''; width: 7px; flex: none; }
        .mi-main { flex: 1; min-width: 0; }
        .mi-who { font-size: 12px; color: rgba(148,163,184,0.9); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mi-sub { font-size: 14px; color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mi-time { font-size: 11px; color: rgba(148,163,184,0.6); white-space: nowrap; }
        .empty { padding: 30px; text-align: center; font-size: 13px; color: rgba(148,163,184,0.7); }

        /* reading pane */
        .reader { border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 22px 24px; min-height: 66vh; }
        .reader-empty { display: flex; align-items: center; justify-content: center; height: 60vh; font-size: 13px; color: rgba(148,163,184,0.55); }
        .reader h2 { margin: 0 0 10px; font-size: 19px; color: #fff; }
        .kv { font-size: 12px; color: rgba(148,163,184,0.9); margin: 2px 0; }
        .kv b { color: #cbd5e1; font-weight: 500; display: inline-block; width: 42px; }
        .body-view { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
        .reader-acts { display: flex; gap: 8px; margin-top: 20px; }

        /* settings panel */
        .settings-panel { margin-top: 22px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 18px; }
        .backup-row { display: flex; gap: 8px; align-items: center; max-width: 520px; }
        .backup-row input { flex: 1; }

        /* compose modal */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50; }
        .modal { width: 100%; max-width: 640px; max-height: 88vh; overflow: auto; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 22px; }
        .modal h2 { margin: 0 0 12px; font-size: 18px; color: #fff; }
        .modal-acts { display: flex; gap: 8px; align-items: center; margin-top: 18px; }

        @media (max-width: 760px) {
            .toolbar { flex-wrap: wrap; }
            .mail-layout { grid-template-columns: 1fr; }
            .maillist { max-height: 46vh; }
            .reader { min-height: 0; }
            .reader:not(.has-mail) { display: none; }
        }
    </style>
</head>
<body>
    <!-- ── Logged-out ─────────────────────────────────────────── -->
    <div class="card auth" id="auth-card">
        <h1 class="brand">BEWE</h1>
        <div class="tabs">
            <button class="tab active" id="tab-login" onclick="showTab('login')">로그인</button>
            <button class="tab" id="tab-signup" onclick="showTab('signup')">회원가입</button>
        </div>
        <form id="form-login" onsubmit="return doLogin(event)">
            <label>아이디</label>
            <input id="login-user" autocomplete="username" autocapitalize="none" spellcheck="false" required>
            <label>비밀번호</label>
            <input id="login-pass" type="password" autocomplete="current-password" required>
            <button class="primary full" type="submit">로그인</button>
        </form>
        <form id="form-signup" class="hidden" onsubmit="return doSignup(event)">
            <label>원하는 아이디</label>
            <input id="signup-user" autocapitalize="none" spellcheck="false" placeholder="예: hong" required>
            <div class="suffix"><span id="signup-preview">아이디</span>@bewe.co.kr</div>
            <label>비밀번호 (8자 이상)</label>
            <input id="signup-pass" type="password" autocomplete="new-password" required>
            <button class="primary full" type="submit">가입 신청</button>
            <div class="suffix" style="margin-top:10px">관리자 승인 후 이용할 수 있습니다.</div>
        </form>
        <div class="msg" id="auth-msg"></div>
    </div>

    <!-- ── Logged-in (My Page) ────────────────────────────────── -->
    <div class="card app hidden" id="app-card">
        <header class="app-head">
            <div>
                <div class="email-badge" id="me-email">—</div>
                <div class="suffix" id="me-status"></div>
            </div>
            <div class="head-actions">
                <button class="btn-ghost" id="btn-settings" onclick="toggleSettings()">설정</button>
                <button class="linkbtn" onclick="doLogout()">로그아웃</button>
            </div>
        </header>

        <div class="toolbar">
            <button class="boxbtn active" id="box-inbox" onclick="loadBox('inbox')">받은편지함<span class="badge-count hidden" id="unread-badge">0</span></button>
            <button class="boxbtn" id="box-sent" onclick="loadBox('sent')">보낸편지함</button>
            <div style="flex:1"></div>
            <button class="primary" onclick="openCompose()">✎ 새 메일</button>
        </div>

        <div class="mail-layout">
            <div class="maillist" id="maillist"><div class="empty">불러오는 중…</div></div>
            <div class="reader" id="reader">
                <div class="reader-empty" id="reader-empty">읽을 메일을 선택하세요.</div>
                <div class="hidden" id="reader-content">
                    <h2 id="rd-subject"></h2>
                    <div class="kv"><b>From</b> <span id="rd-from"></span></div>
                    <div class="kv"><b>To</b> <span id="rd-to"></span></div>
                    <div class="kv"><b>Date</b> <span id="rd-date"></span></div>
                    <div class="body-view" id="rd-body"></div>
                    <div class="reader-acts">
                        <button class="primary" id="rd-reply">답장</button>
                        <button class="mini reject" id="rd-delete">삭제</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- settings (toggle) -->
        <div class="settings-panel hidden" id="settings-panel">
            <p class="section-title">백업 수신 주소</p>
            <div class="suffix" style="margin-bottom:8px">받은 메일 사본을 이 주소로도 전달 (Cloudflare 인증 필요).</div>
            <div class="backup-row">
                <input id="backup-input" placeholder="backup@example.com" autocapitalize="none" spellcheck="false">
                <button class="primary" onclick="saveBackup()">저장</button>
            </div>
            <div class="msg" id="backup-msg"></div>

            <div id="admin-panel" class="hidden">
                <hr>
                <p class="section-title">가입 승인 대기</p>
                <div id="pending-list" style="font-size:13px; color:rgba(148,163,184,0.8)">불러오는 중…</div>
            </div>
        </div>
    </div>

    <!-- compose modal -->
    <div class="overlay hidden" id="compose-overlay">
        <div class="modal">
            <h2>새 메일</h2>
            <form onsubmit="return doSend(event)">
                <label>받는사람</label>
                <input id="cp-to" placeholder="someone@bewe.co.kr" autocapitalize="none" spellcheck="false" required>
                <label>제목</label>
                <input id="cp-subject">
                <label>내용</label>
                <textarea id="cp-body"></textarea>
                <div class="modal-acts">
                    <button class="primary" type="submit">보내기</button>
                    <div style="flex:1"></div>
                    <button class="mini" type="button" onclick="closeOverlay('compose-overlay')">취소</button>
                </div>
                <div class="msg" id="cp-msg"></div>
            </form>
        </div>
    </div>

    <script>
        const $ = (id) => document.getElementById(id);
        let currentBox = 'inbox';
        let currentMailId = null;
        let me = null;

        async function api(path, opts) {
            const r = await fetch(path, Object.assign({ headers: { 'Content-Type': 'application/json' } }, opts));
            let data = {}; try { data = await r.json(); } catch {}
            return { ok: r.ok, status: r.status, data };
        }
        function setMsg(text, kind) { const m = $('auth-msg'); m.textContent = text || ''; m.className = 'msg ' + (kind || ''); }
        function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
        function fmtTime(ms) {
            const d = new Date(ms), now = new Date();
            const sameDay = d.toDateString() === now.toDateString();
            return sameDay ? d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
                           : d.toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' });
        }
        function closeOverlay(id) { $(id).classList.add('hidden'); }

        // ── auth ──
        function showTab(which) {
            $('tab-login').classList.toggle('active', which === 'login');
            $('tab-signup').classList.toggle('active', which === 'signup');
            $('form-login').classList.toggle('hidden', which !== 'login');
            $('form-signup').classList.toggle('hidden', which !== 'signup');
            setMsg('');
        }
        $('signup-user').addEventListener('input', (e) => { $('signup-preview').textContent = (e.target.value || '아이디').toLowerCase(); });

        async function doSignup(e) {
            e.preventDefault();
            const username = $('signup-user').value.trim().toLowerCase();
            const password = $('signup-pass').value;
            const { ok, data } = await api('/api/auth/signup', { method: 'POST', body: JSON.stringify({ username, password }) });
            if (!ok) { setMsg(data.error || '가입 실패', 'err'); return false; }
            setMsg('가입 신청 완료. 관리자 승인 후 로그인하세요.', 'ok');
            showTab('login'); $('login-user').value = username;
            return false;
        }
        async function doLogin(e) {
            e.preventDefault();
            const username = $('login-user').value.trim().toLowerCase();
            const password = $('login-pass').value;
            const { ok, data } = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
            if (!ok) { setMsg(data.error || '로그인 실패', 'err'); return false; }
            await refresh();
            return false;
        }
        async function doLogout() { await api('/api/auth/logout', { method: 'POST' }); location.reload(); }

        // ── mailbox ──
        function clearReader() {
            currentMailId = null;
            $('reader-content').classList.add('hidden');
            $('reader-empty').classList.remove('hidden');
            $('reader').classList.remove('has-mail');
        }

        async function loadBox(box) {
            currentBox = box;
            $('box-inbox').classList.toggle('active', box === 'inbox');
            $('box-sent').classList.toggle('active', box === 'sent');
            const { ok, data } = await api('/api/mail/list?box=' + box);
            if (!ok) return;
            const badge = $('unread-badge');
            if (data.unread > 0) { badge.textContent = data.unread; badge.classList.remove('hidden'); }
            else badge.classList.add('hidden');
            const list = $('maillist');
            if (!data.emails.length) { list.innerHTML = `<div class="empty">${box === 'inbox' ? '받은 메일이 없습니다.' : '보낸 메일이 없습니다.'}</div>`; clearReader(); return; }
            list.innerHTML = '';
            for (const m of data.emails) {
                const who = box === 'inbox' ? m.from_addr : ('→ ' + m.to_addr);
                const div = document.createElement('div');
                div.className = 'mailitem ' + (box === 'inbox' && !m.seen ? 'unseen' : 'seen');
                div.dataset.id = m.id;
                if (m.id === currentMailId) div.classList.add('active');
                div.innerHTML = `<div class="mi-main">
                        <div class="mi-who">${esc(who)}</div>
                        <div class="mi-sub">${esc(m.subject || '(제목 없음)')}</div>
                    </div><div class="mi-time">${fmtTime(m.created_at)}</div>`;
                div.onclick = () => openMail(m.id);
                list.appendChild(div);
            }
        }

        async function openMail(id) {
            const { ok, data: m } = await api('/api/mail/' + id);
            if (!ok) return;
            currentMailId = id;
            $('rd-subject').textContent = m.subject || '(제목 없음)';
            $('rd-from').textContent = m.from_addr;
            $('rd-to').textContent = m.to_addr;
            $('rd-date').textContent = new Date(m.created_at).toLocaleString('ko-KR');
            $('rd-body').textContent = m.body_text || '';
            $('rd-reply').onclick = () => openCompose({ to: m.direction === 'in' ? m.from_addr : m.to_addr, subject: 'Re: ' + (m.subject || '') });
            $('rd-delete').onclick = async () => {
                await api('/api/mail/' + id, { method: 'DELETE' });
                clearReader(); loadBox(currentBox);
            };
            $('reader-empty').classList.add('hidden');
            $('reader-content').classList.remove('hidden');
            $('reader').classList.add('has-mail');
            document.querySelectorAll('.mailitem.active').forEach(e => e.classList.remove('active'));
            const el = document.querySelector('.mailitem[data-id="' + id + '"]');
            if (el) {
                el.classList.add('active');
                if (el.classList.contains('unseen')) {           // just got read → update badge
                    el.classList.remove('unseen'); el.classList.add('seen');
                    const badge = $('unread-badge');
                    const n = Math.max(0, (parseInt(badge.textContent, 10) || 0) - 1);
                    if (n > 0) badge.textContent = n; else badge.classList.add('hidden');
                }
            }
            if (window.matchMedia('(max-width: 760px)').matches) $('reader').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function openCompose(prefill) {
            prefill = prefill || {};
            $('cp-to').value = prefill.to || '';
            $('cp-subject').value = prefill.subject || '';
            $('cp-body').value = prefill.body || '';
            $('cp-msg').textContent = '';
            $('compose-overlay').classList.remove('hidden');
            $('cp-to').focus();
        }
        async function doSend(e) {
            e.preventDefault();
            const to = $('cp-to').value.trim();
            const subject = $('cp-subject').value;
            const body = $('cp-body').value;
            const m = $('cp-msg');
            const { ok, data } = await api('/api/mail/send', { method: 'POST', body: JSON.stringify({ to, subject, body }) });
            if (!ok) { m.className = 'msg err'; m.textContent = data.error || '발송 실패'; return false; }
            m.className = 'msg ok';
            m.textContent = data.delivered_internally ? '전송 완료 (내부 배달됨).' : (data.note || '전송 완료.');
            setTimeout(() => { closeOverlay('compose-overlay'); loadBox(currentBox); }, 900);
            return false;
        }

        // ── settings ──
        function toggleSettings() {
            const p = $('settings-panel');
            const shown = p.classList.toggle('hidden');
            $('btn-settings').classList.toggle('on', !shown);
            if (!shown && me && me.status === 'admin') loadPending();
        }
        function initSettings() { $('backup-input').value = (me && me.backup_email) || ''; }
        async function saveBackup() {
            const backup_email = $('backup-input').value.trim();
            const m = $('backup-msg');
            const { ok, data } = await api('/api/mail/settings/backup', { method: 'POST', body: JSON.stringify({ backup_email }) });
            if (!ok) { m.className = 'msg err'; m.textContent = data.error || '저장 실패'; return; }
            me.backup_email = data.backup_email;
            m.className = 'msg ok';
            m.textContent = data.backup_email
                ? '저장됨. Cloudflare 인증 후 전달됩니다.'
                : '해제됨.';
        }

        // ── admin ──
        async function loadPending() {
            const { ok, data } = await api('/api/admin/pending');
            if (!ok) return;
            const box = $('pending-list');
            if (!data.length) { box.textContent = '대기 중인 신청이 없습니다.'; return; }
            box.innerHTML = '';
            for (const u of data) {
                const row = document.createElement('div');
                row.className = 'pending-item';
                row.innerHTML = `<span class="email-badge">${esc(u.email)}</span>
                    <span class="acts"><button class="mini approve">승인</button><button class="mini reject">거절</button></span>`;
                row.querySelector('.approve').onclick = async () => { await api('/api/admin/approve', { method: 'POST', body: JSON.stringify({ username: u.username }) }); loadPending(); };
                row.querySelector('.reject').onclick  = async () => { await api('/api/admin/reject',  { method: 'POST', body: JSON.stringify({ username: u.username }) }); loadPending(); };
                box.appendChild(row);
            }
        }

        // ── boot ──
        async function refresh() {
            const { data } = await api('/api/auth/me');
            me = data.user;
            if (!me) { $('auth-card').classList.remove('hidden'); $('app-card').classList.add('hidden'); document.body.classList.remove('app-mode'); return; }
            $('auth-card').classList.add('hidden');
            $('app-card').classList.remove('hidden');
            document.body.classList.add('app-mode');
            $('me-email').textContent = me.email;
            $('me-status').innerHTML = `<span class="status-pill">${me.status}</span>`;
            initSettings();
            $('admin-panel').classList.toggle('hidden', me.status !== 'admin');
            clearReader();
            loadBox('inbox');
        }
        refresh();
    </script>
</body>
</html>
