<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEWE — 작전 현황</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        :root {
            --bg: #03060f;
            --panel: rgba(255,255,255,0.035);
            --panel-strong: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.08);
            --border-strong: rgba(255,255,255,0.16);
            --text: #e8edf5;
            --text-dim: rgba(232,237,245,0.55);
            --text-faint: rgba(232,237,245,0.35);
            --accent: #60a5fa;
            --accent-dim: rgba(96,165,250,0.18);
            --ok: #4ade80;
            --ok-bg: rgba(74,222,128,0.10);
            --warn: #fbbf24;
            --warn-bg: rgba(251,191,36,0.10);
            --err: #f87171;
            --err-bg: rgba(248,113,113,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background:
                radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(96,165,250,0.04) 0%, transparent 50%),
                var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Noto Sans KR', 'Segoe UI', sans-serif;
            font-weight: 400;
            min-height: 100vh;
            padding: 28px clamp(24px, 4vw, 56px) 48px;
            line-height: 1.45;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Top bar ────────────────────────────────────────────────── */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px;
        }
        .brand {
            display: flex; align-items: baseline; gap: 14px;
        }
        .brand .name {
            font-size: 22px; font-weight: 900; letter-spacing: 6px; color: #fff;
        }
        .brand .tag {
            font-size: 10px; font-weight: 600; letter-spacing: 3px; color: var(--text-faint);
            text-transform: uppercase;
        }
        .topbar a {
            color: var(--text-dim); text-decoration: none;
            font-size: 12px; font-weight: 600; letter-spacing: 1px;
            padding: 8px 14px; border-radius: 6px;
            transition: color .15s, background .15s;
            text-transform: uppercase;
        }
        .topbar a:hover { color: #fff; background: var(--panel); }

        /* ── Header ─────────────────────────────────────────────────── */
        .header {
            display: flex; justify-content: space-between; align-items: flex-end;
            gap: 20px; margin-bottom: 22px; flex-wrap: wrap;
        }
        .header-left h1 {
            font-size: clamp(22px, 2.4vw, 30px);
            font-weight: 700; letter-spacing: 0.3px;
            color: #fff;
        }
        .header-left .sub {
            font-size: 12px; color: var(--text-faint); letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .central-pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 999px;
            font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
            text-transform: uppercase;
        }
        .central-pill.ok  { background: var(--ok-bg);  color: var(--ok);  border: 1px solid rgba(74,222,128,0.30); }
        .central-pill.err { background: var(--err-bg); color: var(--err); border: 1px solid rgba(248,113,113,0.30); }
        .pill-dot {
            width: 7px; height: 7px; border-radius: 50%; background: currentColor;
            box-shadow: 0 0 6px currentColor;
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,100% { opacity: 1; }
            50%     { opacity: 0.35; }
        }

        /* ── KPI strip ──────────────────────────────────────────────── */
        .kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }
        .kpi {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
        }
        .kpi::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
            background: var(--accent); opacity: 0.7;
        }
        .kpi.ok::before   { background: var(--ok);   }
        .kpi.warn::before { background: var(--warn); }
        .kpi.err::before  { background: var(--err);  }
        .kpi-label {
            font-size: 10.5px; font-weight: 700; letter-spacing: 1.3px;
            color: var(--text-dim); text-transform: uppercase;
            margin-bottom: 10px;
        }
        .kpi-value {
            font-size: 32px; font-weight: 800; color: #fff;
            line-height: 1; letter-spacing: -0.5px;
            font-variant-numeric: tabular-nums;
        }
        .kpi-value .sub {
            font-size: 14px; font-weight: 500; color: var(--text-dim);
            margin-left: 4px;
        }
        .kpi-note {
            font-size: 11px; color: var(--text-faint); margin-top: 6px;
        }

        /* ── Section header ────────────────────────────────────────── */
        .section-title {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 14px; font-weight: 700; letter-spacing: 1.5px;
            color: var(--text-dim); text-transform: uppercase;
            margin: 10px 0 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .section-title .count {
            font-weight: 400; color: var(--text-faint); letter-spacing: 0.5px;
        }

        /* ── Station grid ──────────────────────────────────────────── */
        .stations {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 14px;
        }
        .station {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color .2s, background .2s;
        }
        .station:hover { border-color: var(--border-strong); }
        .station.offline { opacity: 0.55; }
        .station-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 18px 12px;
            cursor: pointer;
            user-select: none;
        }
        .station-head:hover { background: rgba(255,255,255,0.02); }
        .station-id {
            display: flex; align-items: center; gap: 10px;
        }
        .status-led {
            width: 10px; height: 10px; border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
            flex-shrink: 0;
        }
        .led-on  { background: var(--ok);   color: var(--ok);  animation: dotPulse 2s ease-in-out infinite; }
        .led-off { background: var(--err);  color: var(--err); }
        .station-name {
            font-size: 16px; font-weight: 700; color: #fff;
            letter-spacing: 0.5px;
        }
        .station-meta {
            font-size: 10.5px; color: var(--text-faint);
            letter-spacing: 0.8px; text-transform: uppercase;
            margin-top: 2px;
        }
        .station-summary {
            font-size: 11px; color: var(--text-dim); text-align: right;
        }
        .station-summary .age {
            font-weight: 600; color: var(--text);
        }
        .station-rec {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 2px 8px; border-radius: 4px;
            font-size: 9.5px; font-weight: 700; letter-spacing: 1px;
            background: var(--err-bg); color: var(--err);
            margin-left: 6px;
        }
        .station-rec .dot {
            width: 5px; height: 5px; border-radius: 50%; background: currentColor;
            animation: recBlink 1.2s ease-in-out infinite;
        }
        @keyframes recBlink {
            0%,49%   { opacity: 1; }
            50%,100% { opacity: 0.25; }
        }

        .station-body {
            padding: 0 18px 18px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .stat {
            background: rgba(255,255,255,0.025);
            border-radius: 8px;
            padding: 10px 12px;
        }
        .stat-label {
            font-size: 9.5px; font-weight: 700; letter-spacing: 1px;
            color: var(--text-faint); text-transform: uppercase;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 17px; font-weight: 700; color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .stat-value .u {
            font-size: 10px; font-weight: 500; color: var(--text-dim);
            margin-left: 2px;
        }

        /* ── Expandable detail ─────────────────────────────────────── */
        .detail {
            border-top: 1px solid var(--border);
            padding: 14px 18px 16px;
            display: none;
        }
        .station.expanded .detail { display: block; }
        .station.expanded .station-head .chevron { transform: rotate(180deg); }
        .chevron {
            width: 18px; height: 18px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-left: 8px;
            color: var(--text-faint);
            transition: transform .2s;
            font-size: 12px;
        }
        .detail-section {
            margin-bottom: 14px;
        }
        .detail-section:last-child { margin-bottom: 0; }
        .detail-title {
            font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
            color: var(--accent); text-transform: uppercase;
            margin-bottom: 8px;
        }
        .detail-empty {
            font-size: 12px; color: var(--text-faint);
            padding: 8px 0;
        }
        .chlist, .schedlist {
            display: flex; flex-direction: column; gap: 6px;
        }
        .chrow, .schedrow {
            display: grid;
            grid-template-columns: 30px 1fr auto auto;
            gap: 10px;
            align-items: center;
            font-size: 12px;
            padding: 8px 10px;
            background: rgba(255,255,255,0.025);
            border-radius: 6px;
        }
        .chrow .chnum, .schedrow .schnum {
            font-weight: 700; color: var(--accent);
            font-variant-numeric: tabular-nums; font-size: 11px;
        }
        .chrow .chmode {
            display: inline-block;
            font-size: 9.5px; font-weight: 700; letter-spacing: 0.8px;
            padding: 2px 6px; border-radius: 3px;
            background: var(--accent-dim); color: var(--accent);
            text-transform: uppercase;
            margin-right: 8px;
        }
        .chrow .chfreq, .schedrow .schfreq {
            color: #fff; font-weight: 600; font-variant-numeric: tabular-nums;
        }
        .chrow .chrec, .schedrow .schstatus {
            font-size: 9.5px; font-weight: 700; letter-spacing: 1px;
            padding: 2px 7px; border-radius: 4px;
        }
        .chrec.iq    { background: rgba(248,113,113,0.15); color: var(--err); }
        .chrec.audio { background: rgba(251,191,36,0.15); color: var(--warn); }
        .chrec.none  { background: rgba(255,255,255,0.04); color: var(--text-faint); }
        .schstatus.idle  { background: rgba(255,255,255,0.04); color: var(--text-faint); }
        .schstatus.armed { background: var(--warn-bg); color: var(--warn); }
        .schstatus.active{ background: var(--ok-bg); color: var(--ok); }
        .schstatus.done  { background: rgba(255,255,255,0.04); color: var(--text-faint); }

        .joins {
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .join-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 11px; border-radius: 999px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            font-size: 11.5px; color: var(--text);
        }
        .join-pill .tier {
            font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
            padding: 1px 5px; border-radius: 3px;
            background: var(--accent-dim); color: var(--accent);
        }

        .hist-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px;
        }
        .hist-item .lbl {
            font-size: 9.5px; font-weight: 700; letter-spacing: 1px;
            color: var(--text-faint); text-transform: uppercase;
            margin-bottom: 3px;
        }
        .hist-item .val {
            font-size: 13px; color: #fff; font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* ── Footer ────────────────────────────────────────────────── */
        .footer {
            margin-top: 38px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 11px; color: var(--text-faint);
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;
        }
        .footer .live {
            display: inline-flex; align-items: center; gap: 6px;
        }

        .hidden { display: none !important; }

        @media (max-width: 640px) {
            body { padding: 18px 16px 30px; }
            .station-body { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-value { font-size: 15px; }
            .stations { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="brand">
        <div class="name">BEWE</div>
        <div class="tag">Behind Everyone We Hear Everything</div>
    </div>
    <a href="/">홈으로</a>
</div>

<div class="header">
    <div class="header-left">
        <h1>전방 신호정보 작전 현황</h1>
        <div class="sub" id="last-update">데이터 수신 대기 중…</div>
    </div>
    <div id="central-pill" class="central-pill ok"><span class="pill-dot"></span><span id="central-status">CENTRAL 연결됨</span></div>
</div>

<!-- KPI strip -->
<div class="kpis" id="kpis"></div>

<!-- Stations -->
<div class="section-title">
    <span>전방 수집 노드</span>
    <span class="count" id="stations-count">–</span>
</div>
<div class="stations" id="stations"></div>

<div class="footer">
    <span class="live"><span class="pill-dot" style="color:var(--ok);background:var(--ok)"></span> LIVE · 3초마다 자동 갱신</span>
    <span>BEWE Operations Console · 2026</span>
</div>

<script>
const POLL_MS = 3000;
const DETAIL_POLL_MS = 5000;
const expanded = new Set();          // station_id with detail expanded
const detailCache = new Map();        // station_id → detail JSON
let detailTimers = new Map();

function fmtFreqMHz(hz) {
    if (!hz || hz <= 0) return '—';
    return (hz / 1e6).toFixed(3) + ' MHz';
}
function fmtBwKHz(hz) {
    if (!hz || hz <= 0) return '—';
    return (hz / 1e3).toFixed(0) + ' kHz';
}
function fmtAge(ms) {
    if (ms == null) return '—';
    const s = Math.floor(ms / 1000);
    if (s < 5) return '방금';
    if (s < 60) return s + '초 전';
    const m = Math.floor(s / 60);
    if (m < 60) return m + '분 전';
    const h = Math.floor(m / 60);
    return h + '시간 전';
}
function fmtClockKST(unixSec) {
    if (!unixSec || unixSec <= 0) return '—';
    const d = new Date(unixSec * 1000);
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    return hh + ':' + mm;
}
function fmtDuration(sec) {
    if (!sec || sec <= 0) return '—';
    if (sec < 60) return Math.round(sec) + '초';
    const m = Math.floor(sec / 60);
    if (m < 60) return m + '분';
    return (sec / 3600).toFixed(1) + '시간';
}
const MODE_NAMES = ['AM','FM','USB','LSB','CW','DIGITAL','—','—','—','—'];
function modeName(m) { return MODE_NAMES[m] || '—'; }
const SCHED_STATUS = { 0: ['idle','대기'], 1: ['armed','ARMED'], 2: ['active','녹음 중'], 3: ['done','완료'] };
function schedStatus(s) { return SCHED_STATUS[s] || ['idle','—']; }

function renderKpis(data) {
    const stations = data.stations || [];
    const online = stations.filter(s => s.online);
    const totalAnalysts = online.reduce((a,s) => a + (s.users || 0), 0);
    const totalChannels = online.reduce((a,s) => a + (s.channel_count || 0), 0);
    const recCount = online.filter(s => s.hist_recording).length;
    const offlineCount = stations.length - online.length;

    const kpis = [
        { cls: online.length === stations.length && stations.length > 0 ? 'ok' : (online.length === 0 ? 'err' : 'warn'),
          lbl: '운용 사이트', val: online.length, sub: '/ ' + stations.length,
          note: offlineCount > 0 ? offlineCount + '개 사이트 단절' : '전 사이트 정상 운용' },
        { cls: totalAnalysts > 0 ? 'ok' : '',
          lbl: '근무 분석관', val: totalAnalysts,
          note: totalAnalysts > 0 ? '실시간 관제 중' : '분석관 미접속' },
        { cls: totalChannels > 0 ? 'ok' : '',
          lbl: '활성 감청 채널', val: totalChannels,
          note: '동시 복조 중' },
        { cls: recCount > 0 ? 'ok' : '',
          lbl: '임무 녹음', val: recCount,
          note: recCount > 0 ? '신호 영구 아카이브 중' : '대기' },
    ];

    document.getElementById('kpis').innerHTML = kpis.map(k => `
        <div class="kpi ${k.cls}">
            <div class="kpi-label">${k.lbl}</div>
            <div class="kpi-value">${k.val}${k.sub ? `<span class="sub">${k.sub}</span>` : ''}</div>
            <div class="kpi-note">${k.note}</div>
        </div>
    `).join('');
}

function renderStations(data) {
    const stations = data.stations || [];
    document.getElementById('stations-count').textContent = stations.length + '개';

    if (stations.length === 0) {
        document.getElementById('stations').innerHTML = `
            <div style="grid-column:1/-1;background:var(--panel);border:1px dashed var(--border);border-radius:12px;padding:40px;text-align:center;color:var(--text-faint);font-size:13px;">
                현재 등록된 전방 노드가 없습니다.
            </div>`;
        return;
    }

    document.getElementById('stations').innerHTML = stations.map(s => {
        const isExp = expanded.has(s.station_id);
        const cls = (s.online ? '' : 'offline') + (isExp ? ' expanded' : '');
        const led = s.online ? 'led-on' : 'led-off';
        const tierLabel = s.tier ? `Tier ${s.tier}` : '';
        const ageStr = s.online ? '실시간' : fmtAge(s.ageMs);
        return `
        <div class="station ${cls}" data-id="${s.station_id}">
            <div class="station-head" onclick="toggleStation('${s.station_id}')">
                <div>
                    <div class="station-id">
                        <span class="status-led ${led}"></span>
                        <span class="station-name">${escapeHtml(s.name || s.station_id)}</span>
                        ${s.hist_recording ? `<span class="station-rec"><span class="dot"></span>REC</span>` : ''}
                    </div>
                    <div class="station-meta">${tierLabel}${s.operator_login ? ' · ' + escapeHtml(s.operator_login) + ' 운용' : ''}</div>
                </div>
                <div class="station-summary">
                    <div class="age">${ageStr}</div>
                    <div class="chevron">&#9662;</div>
                </div>
            </div>
            <div class="station-body">
                <div class="stat">
                    <div class="stat-label">분석관</div>
                    <div class="stat-value">${s.users || 0}<span class="u">명</span></div>
                </div>
                <div class="stat">
                    <div class="stat-label">감청 채널</div>
                    <div class="stat-value">${s.channel_count || 0}<span class="u">개</span></div>
                </div>
                <div class="stat">
                    <div class="stat-label">중심 주파수</div>
                    <div class="stat-value" style="font-size:14px;">${fmtFreqMHz(s.center_freq_hz)}</div>
                </div>
            </div>
            <div class="detail" id="detail-${s.station_id}">
                ${renderDetail(s.station_id)}
            </div>
        </div>`;
    }).join('');
}

function renderDetail(id) {
    const d = detailCache.get(id);
    if (!d) return `<div class="detail-empty">상세 정보 로딩 중…</div>`;

    let html = '';

    // Active channels
    html += `<div class="detail-section">
        <div class="detail-title">활성 감청 채널 (${d.channels.length})</div>`;
    if (d.channels.length === 0) {
        html += `<div class="detail-empty">현재 활성 채널 없음</div>`;
    } else {
        html += `<div class="chlist">`;
        for (const c of d.channels) {
            const center = ((c.s_mhz + c.e_mhz) / 2);
            const bw_kHz = ((c.e_mhz - c.s_mhz) * 1000);
            let rec = `<span class="chrec none">대기</span>`;
            if (c.iq_rec_on)      rec = `<span class="chrec iq">IQ 녹음</span>`;
            else if (c.audio_rec_on) rec = `<span class="chrec audio">AUDIO 녹음</span>`;
            const owner = c.owner ? ` · ${escapeHtml(c.owner)}` : '';
            html += `<div class="chrow">
                <span class="chnum">${String(c.index + 1).padStart(2,'0')}</span>
                <span><span class="chmode">${modeName(c.mode)}</span><span class="chfreq">${center.toFixed(3)} MHz</span>${owner}</span>
                <span style="color:var(--text-faint);font-size:11px;">${bw_kHz.toFixed(0)} kHz</span>
                ${rec}
            </div>`;
        }
        html += `</div>`;
    }
    html += `</div>`;

    // Joins (connected analysts)
    html += `<div class="detail-section">
        <div class="detail-title">접속 분석관 (${d.joins.length})</div>`;
    if (d.joins.length === 0) {
        html += `<div class="detail-empty">접속 중인 분석관 없음</div>`;
    } else {
        html += `<div class="joins">`;
        for (const j of d.joins) {
            html += `<span class="join-pill"><span class="tier">T${j.tier}</span>${escapeHtml(j.name)}</span>`;
        }
        html += `</div>`;
    }
    html += `</div>`;

    // Schedules
    const armed = d.scheds.filter(s => s.valid);
    html += `<div class="detail-section">
        <div class="detail-title">사전 임무 (${armed.length})</div>`;
    if (armed.length === 0) {
        html += `<div class="detail-empty">예정된 임무 없음</div>`;
    } else {
        html += `<div class="schedlist">`;
        for (const s of armed) {
            const [cls, lbl] = schedStatus(s.status);
            const tgt = s.target ? ` → ${escapeHtml(s.target)}` : '';
            html += `<div class="schedrow">
                <span class="schnum">#${(s.op_index || 0) + 1}</span>
                <span><span class="schfreq">${s.freq_mhz.toFixed(3)} MHz</span>${tgt}</span>
                <span style="color:var(--text-faint);font-size:11px;">${fmtClockKST(s.start_time)} · ${fmtDuration(s.duration_sec)}</span>
                <span class="schstatus ${cls}">${lbl}</span>
            </div>`;
        }
        html += `</div>`;
    }
    html += `</div>`;

    // HIST (mission archive)
    if (d.hist) {
        const elapsed = (Math.floor(Date.now() / 1000) - d.hist.start_utc_unix);
        html += `<div class="detail-section">
            <div class="detail-title">임무 아카이브 (HIST)</div>
            <div class="hist-info">
                <div class="hist-item"><div class="lbl">시작</div><div class="val">${fmtClockKST(d.hist.start_utc_unix)}</div></div>
                <div class="hist-item"><div class="lbl">경과</div><div class="val">${fmtDuration(elapsed)}</div></div>
                <div class="hist-item"><div class="lbl">중심 주파수</div><div class="val">${fmtFreqMHz(d.hist.center_freq_hz)}</div></div>
                <div class="hist-item"><div class="lbl">대역폭</div><div class="val">${fmtBwKHz(d.hist.sample_rate_hz)}</div></div>
            </div>
        </div>`;
    }
    return html;
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

window.toggleStation = function(id) {
    if (expanded.has(id)) {
        expanded.delete(id);
        if (detailTimers.has(id)) { clearInterval(detailTimers.get(id)); detailTimers.delete(id); }
    } else {
        expanded.add(id);
        fetchDetail(id);
        const t = setInterval(() => fetchDetail(id), DETAIL_POLL_MS);
        detailTimers.set(id, t);
    }
    // Re-render only affected card
    const card = document.querySelector(`.station[data-id="${id}"]`);
    if (card) {
        card.classList.toggle('expanded', expanded.has(id));
        const detail = card.querySelector('.detail');
        if (detail) detail.innerHTML = renderDetail(id);
    }
};

async function fetchDetail(id) {
    try {
        const r = await fetch('/api/station/' + encodeURIComponent(id) + '/detail');
        if (!r.ok) return;
        const d = await r.json();
        detailCache.set(id, d);
        // Update only this card's detail content (no full re-render)
        const card = document.querySelector(`.station[data-id="${id}"]`);
        if (card && card.classList.contains('expanded')) {
            const detail = card.querySelector('.detail');
            if (detail) detail.innerHTML = renderDetail(id);
        }
    } catch (e) { /* silent */ }
}

async function poll() {
    try {
        const r = await fetch('/api/status');
        if (!r.ok) throw new Error('status unreachable');
        const data = await r.json();

        // Central pill
        const pill = document.getElementById('central-pill');
        const ptxt = document.getElementById('central-status');
        if (data.central?.reachable) {
            pill.className = 'central-pill ok';
            ptxt.textContent = 'CENTRAL 연결됨';
        } else {
            pill.className = 'central-pill err';
            ptxt.textContent = 'CENTRAL 단절';
        }

        renderKpis(data);
        renderStations(data);

        const now = new Date();
        const hh = String(now.getHours()).padStart(2,'0');
        const mm = String(now.getMinutes()).padStart(2,'0');
        const ss = String(now.getSeconds()).padStart(2,'0');
        document.getElementById('last-update').textContent = `최종 갱신: ${hh}:${mm}:${ss}`;
    } catch (e) {
        const pill = document.getElementById('central-pill');
        pill.className = 'central-pill err';
        document.getElementById('central-status').textContent = '서버 응답 없음';
    }
}
poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
