<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEWE</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        :root {
            --bg: #1e2530;          /* page background (dim, not pure black) */
            --card: #2a3340;         /* main card surface */
            --card-2: #323c4b;       /* raised surfaces: list, reader, inputs */
            --text: #e8edf4;         /* primary text (high contrast) */
            --text-dim: #a8b3c4;     /* secondary text */
            --text-faint: #7c8798;   /* tertiary / timestamps */
            --border: rgba(255,255,255,0.11);
            --border-soft: rgba(255,255,255,0.07);
            --accent: #e8edf4;       /* neutral white accent (links, active) */
            --accent-2: #3d4757;     /* raised grey for buttons/badges */
            --accent-soft: rgba(255,255,255,0.09); /* selected/active fills */
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
            font-family: 'Inter', 'Segoe UI', 'Noto Sans KR', sans-serif;
            display: flex; align-items: center; justify-content: center; padding: 24px 16px;
        }
        body.app-mode { align-items: flex-start; height: 100dvh; padding: 16px; }   /* logged-in: top-aligned wide app, fit to viewport */
        a { color: var(--accent); }
        .card {
            width: 100%; background: var(--card);
            border: 1px solid var(--border); border-radius: 14px; padding: 24px;
        }
        .card.auth { max-width: 440px; }
        .card.app  { max-width: 1600px; padding: 18px 26px; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        h1 { margin: 0 0 4px; font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: .5px; }
        h1.brand { text-align: center; font-size: 26px; font-weight: 800; letter-spacing: 5px; margin: 4px 0 24px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 18px; }
        .tab {
            flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 500;
            border: 1px solid var(--border); border-radius: 8px; background: none; color: var(--text-dim);
        }
        .tab.active { background: var(--accent-soft); border-color: var(--accent); color: var(--text); }
        label { display: block; font-size: 12px; color: var(--text-dim); margin: 12px 0 5px; }
        input, textarea {
            width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit;
            background: var(--card-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text);
        }
        textarea { resize: vertical; min-height: 150px; line-height: 1.5; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }
        .suffix { font-size: 12px; color: var(--text-faint); margin-top: 4px; }
        button.primary {
            padding: 10px 18px; font-size: 14px; font-weight: 600; font-family: inherit; white-space: nowrap;
            color: #fff; background: #3d4757;
            border: 1px solid rgba(255,255,255,0.14); border-radius: 8px; cursor: pointer;
        }
        button.primary.full { width: 100%; margin-top: 18px; padding: 11px; }
        button.primary:hover { background: #4a5568; }
        button:disabled { opacity: .5; cursor: not-allowed; }
        .msg { margin-top: 12px; font-size: 13px; min-height: 18px; }
        .msg.err { color: #f87171; }
        .msg.ok  { color: #4ade80; }
        .hidden { display: none !important; }
        .email-badge { font-size: 15px; color: var(--accent); }
        .status-pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-dim); }
        .linkbtn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 13px; font-family: inherit; padding: 0; }
        hr { border: none; border-top: 1px solid var(--border-soft); margin: 16px 0; }
        .pending-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; font-size: 13px; }
        .acts { display: flex; gap: 6px; }
        .mini { padding: 5px 10px; font-size: 12px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--text); cursor: pointer; font-family: inherit; }
        .mini.approve { border-color: rgba(74,222,128,0.5); color: #4ade80; }
        .mini.reject  { border-color: rgba(248,113,113,0.5); color: #f87171; }
        .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin: 0 0 6px; }

        /* logged-in header */
        .app-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid var(--border-soft); }
        .head-actions { display: flex; align-items: center; gap: 14px; }
        .btn-ghost { padding: 7px 14px; font-size: 13px; font-family: inherit; cursor: pointer; border: 1px solid var(--border); border-radius: 8px; background: none; color: var(--text-dim); }
        .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
        .btn-ghost.on { background: var(--accent-soft); border-color: var(--accent); color: var(--text); }

        /* toolbar */
        .toolbar { display: flex; align-items: center; gap: 8px; margin: 16px 0 12px; }
        .boxbtn {
            padding: 7px 16px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; white-space: nowrap;
            border: 1px solid var(--border); border-radius: 8px; background: none; color: var(--text-dim);
        }
        .boxbtn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--text); }
        .badge-count { display: inline-block; margin-left: 6px; padding: 0 6px; font-size: 11px; border-radius: 999px; background: var(--accent-2); color: #fff; font-weight: 700; }

        /* master-detail layout */
        .mail-layout { display: grid; grid-template-columns: 280px minmax(0, 1fr); gap: 16px; align-items: stretch; flex: 1; min-height: 0; }
        .maillist { background: var(--card-2); border: 1px solid var(--border-soft); border-radius: 10px; overflow-y: auto; min-height: 0; }
        .mailitem { display: flex; gap: 10px; padding: 13px 14px; cursor: pointer; border-bottom: 1px solid var(--border-soft); }
        .mailitem:last-child { border-bottom: none; }
        .mailitem:hover { background: rgba(255,255,255,0.04); }
        .mailitem.active { background: var(--accent-soft); }
        .mailitem.unseen .mi-sub { font-weight: 700; color: var(--text); }
        .mailitem.unseen::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex: none; }
        .mailitem.seen::before { content: ''; width: 7px; flex: none; }
        .mi-main { flex: 1; min-width: 0; }
        .mi-who { font-size: 12px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mi-sub { font-size: 14px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mi-side { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex: none; }
        .mi-time { font-size: 11px; color: var(--text-faint); white-space: nowrap; }
        .mi-acts { display: flex; gap: 10px; opacity: 0; transition: opacity .12s; }
        .mailitem:hover .mi-acts, .mailitem.active .mi-acts { opacity: 1; }
        .mi-act { font-size: 11px; color: var(--text-faint); cursor: pointer; white-space: nowrap; user-select: none; }
        .mi-act:hover { color: var(--accent); }
        .mi-act.del:hover { color: #f87171; }
        .empty { padding: 30px; text-align: center; font-size: 13px; color: var(--text-dim); }

        /* reading pane */
        .reader { background: var(--card-2); border: 1px solid var(--border-soft); border-radius: 10px; padding: 22px 24px; min-height: 0; overflow-y: auto; }
        .reader.has-mail { display: flex; flex-direction: column; }
        #reader-content { display: flex; flex-direction: column; min-height: 0; flex: 1; }
        .reader-empty { display: flex; align-items: center; justify-content: center; height: 100%; min-height: 200px; font-size: 13px; color: var(--text-faint); }
        .reader h2 { margin: 0 0 10px; font-size: 19px; color: var(--text); }
        .kv { font-size: 12px; color: var(--text-dim); margin: 2px 0; }
        .kv b { color: var(--text); font-weight: 500; display: inline-block; width: 42px; }
        .body-view { flex: 1; overflow-y: auto; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-soft); font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
        /* pinned footer: attachments */
        .reader-footer { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-soft); }
        .rd-atts { display: flex; flex-wrap: wrap; gap: 8px; }
        .rd-atts:empty { display: none; }
        .att-chip { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; font-size: 13px; text-decoration: none; color: var(--text); background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; }
        .att-chip:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }

        /* settings panel */
        .settings-panel { margin-top: 22px; border-top: 1px solid var(--border-soft); padding-top: 18px; }
        .backup-row { display: flex; gap: 8px; align-items: center; max-width: 520px; }
        .backup-row input { flex: 1; }

        /* compose (reuses reader pane) */
        #compose-content { display: flex; flex-direction: column; min-height: 0; flex: 1; }
        #compose-content h2 { margin: 0 0 12px; font-size: 19px; color: var(--text); }
        #compose-content label { margin-top: 10px; }
        #compose-content #cp-body { flex: 1; min-height: 120px; margin-bottom: 0; }
        .compose-acts { display: flex; gap: 8px; align-items: center; margin-top: 14px; }

        @media (max-width: 760px) {
            body.app-mode { height: auto; }
            .card.app { height: auto; overflow: visible; }
            .toolbar { flex-wrap: wrap; }
            .mail-layout { grid-template-columns: 1fr; display: flex; flex-direction: column; }
            .maillist { max-height: 46vh; }
            .reader { height: auto; overflow-y: visible; }
            .body-view { overflow-y: visible; }
            .reader:not(.has-mail) { display: none; }
        }
    </style>
</head>
<body>
    <!-- ── Logged-out ─────────────────────────────────────────── -->
    <div class="card auth" id="auth-card">
        <h1 class="brand">BEWE</h1>
        <div class="tabs">
            <button class="tab active" id="tab-login" onclick="showTab('login')">로그인</button>
            <button class="tab" id="tab-signup" onclick="showTab('signup')">회원가입</button>
        </div>
        <form id="form-login" onsubmit="return doLogin(event)">
            <label>아이디</label>
            <input id="login-user" autocomplete="username" autocapitalize="none" spellcheck="false" required>
            <label>비밀번호</label>
            <input id="login-pass" type="password" autocomplete="current-password" required>
            <button class="primary full" type="submit">로그인</button>
        </form>
        <form id="form-signup" class="hidden" onsubmit="return doSignup(event)">
            <label>원하는 아이디</label>
            <input id="signup-user" autocapitalize="none" spellcheck="false" placeholder="예: hong" required>
            <div class="suffix"><span id="signup-preview">아이디</span>@bewe.co.kr</div>
            <label>비밀번호 (8자 이상)</label>
            <input id="signup-pass" type="password" autocomplete="new-password" required>
            <button class="primary full" type="submit">가입 신청</button>
            <div class="suffix" style="margin-top:10px">관리자 승인 후 이용할 수 있습니다.</div>
        </form>
        <div class="msg" id="auth-msg"></div>
    </div>

    <!-- ── Logged-in (My Page) ────────────────────────────────── -->
    <div class="card app hidden" id="app-card">
        <header class="app-head">
            <div>
                <div class="email-badge" id="me-email">—</div>
                <div class="suffix" id="me-status"></div>
            </div>
            <div class="head-actions">
                <button class="btn-ghost" id="btn-settings" onclick="toggleSettings()">설정</button>
                <button class="linkbtn" onclick="doLogout()">로그아웃</button>
            </div>
        </header>

        <div class="toolbar">
            <button class="boxbtn active" id="box-inbox" onclick="loadBox('inbox')">받은편지함<span class="badge-count hidden" id="unread-badge">0</span></button>
            <button class="boxbtn" id="box-sent" onclick="loadBox('sent')">보낸편지함</button>
            <div style="flex:1"></div>
            <button class="primary" onclick="openCompose()">✎ 새 메일</button>
        </div>

        <div class="mail-layout">
            <div class="maillist" id="maillist"><div class="empty">불러오는 중…</div></div>
            <div class="reader" id="reader">
                <div class="reader-empty" id="reader-empty">읽을 메일을 선택하십시오.</div>
                <div class="hidden" id="reader-content">
                    <h2 id="rd-subject"></h2>
                    <div class="kv"><b>From</b> <span id="rd-from"></span></div>
                    <div class="kv"><b>To</b> <span id="rd-to"></span></div>
                    <div class="kv"><b>Date</b> <span id="rd-date"></span></div>
                    <div class="body-view" id="rd-body"></div>
                    <div class="reader-footer" id="reader-footer">
                        <div class="rd-atts" id="rd-atts"></div>
                    </div>
                </div>
                <form class="hidden" id="compose-content" onsubmit="return doSend(event)">
                    <h2 id="cp-title">새 메일</h2>
                    <label>받는사람</label>
                    <input id="cp-to" placeholder="someone@bewe.co.kr" autocapitalize="none" spellcheck="false" required>
                    <label>제목</label>
                    <input id="cp-subject">
                    <label>내용</label>
                    <textarea id="cp-body"></textarea>
                    <div class="reader-footer">
                        <label style="margin-top:0">첨부파일 <span class="suffix" style="margin:0">(최대 10MB)</span></label>
                        <input id="cp-files" type="file" multiple>
                        <div class="compose-acts">
                            <button class="primary" type="submit">보내기</button>
                            <button class="mini" type="button" onclick="closeCompose()">취소</button>
                        </div>
                        <div class="msg" id="cp-msg"></div>
                    </div>
                </form>
            </div>
        </div>

        <!-- settings (toggle) -->
        <div class="settings-panel hidden" id="settings-panel">
            <p class="section-title">백업 수신 주소</p>
            <div class="suffix" style="margin-bottom:8px">받은 메일 사본을 이 주소로도 전달합니다.</div>
            <div class="backup-row">
                <input id="backup-input" placeholder="backup@example.com" autocapitalize="none" spellcheck="false">
                <button class="primary" onclick="saveBackup()">저장</button>
            </div>
            <div class="msg" id="backup-msg"></div>

            <div id="admin-panel" class="hidden">
                <hr>
                <p class="section-title">가입 승인 대기</p>
                <div id="pending-list" style="font-size:13px; color:var(--text-dim)">불러오는 중…</div>
            </div>
        </div>
    </div>

    <script>
        const $ = (id) => document.getElementById(id);
        let currentBox = 'inbox';
        let currentMailId = null;
        let me = null;

        async function api(path, opts) {
            const r = await fetch(path, Object.assign({ headers: { 'Content-Type': 'application/json' } }, opts));
            let data = {}; try { data = await r.json(); } catch {}
            return { ok: r.ok, status: r.status, data };
        }
        function setMsg(text, kind) { const m = $('auth-msg'); m.textContent = text || ''; m.className = 'msg ' + (kind || ''); }
        function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
        function fmtTime(ms) {
            const d = new Date(ms), now = new Date();
            const sameDay = d.toDateString() === now.toDateString();
            return sameDay ? d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
                           : d.toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' });
        }
        function fmtSize(n) { n = n || 0; return n < 1024 ? n + ' B' : n < 1048576 ? (n / 1024).toFixed(0) + ' KB' : (n / 1048576).toFixed(1) + ' MB'; }

        // reader pane has 3 states: 'empty' | 'mail' | 'compose'
        function showReaderPane(state) {
            $('reader-empty').classList.toggle('hidden', state !== 'empty');
            $('reader-content').classList.toggle('hidden', state !== 'mail');
            $('compose-content').classList.toggle('hidden', state !== 'compose');
            $('reader').classList.toggle('has-mail', state !== 'empty');
        }

        // ── auth ──
        function showTab(which) {
            $('tab-login').classList.toggle('active', which === 'login');
            $('tab-signup').classList.toggle('active', which === 'signup');
            $('form-login').classList.toggle('hidden', which !== 'login');
            $('form-signup').classList.toggle('hidden', which !== 'signup');
            setMsg('');
        }
        $('signup-user').addEventListener('input', (e) => { $('signup-preview').textContent = (e.target.value || '아이디').toLowerCase(); });

        async function doSignup(e) {
            e.preventDefault();
            const username = $('signup-user').value.trim().toLowerCase();
            const password = $('signup-pass').value;
            const { ok, data } = await api('/api/auth/signup', { method: 'POST', body: JSON.stringify({ username, password }) });
            if (!ok) { setMsg(data.error || '가입에 실패했습니다.', 'err'); return false; }
            setMsg('가입 신청이 접수되었습니다. 관리자 승인 후 로그인하십시오.', 'ok');
            showTab('login'); $('login-user').value = username;
            return false;
        }
        async function doLogin(e) {
            e.preventDefault();
            const username = $('login-user').value.trim().toLowerCase();
            const password = $('login-pass').value;
            const { ok, data } = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
            if (!ok) { setMsg(data.error || '로그인에 실패했습니다.', 'err'); return false; }
            await refresh();
            return false;
        }
        async function doLogout() { await api('/api/auth/logout', { method: 'POST' }); location.reload(); }

        // ── mailbox ──
        function clearReader() {
            currentMailId = null;
            showReaderPane('empty');
        }

        async function loadBox(box) {
            currentBox = box;
            $('box-inbox').classList.toggle('active', box === 'inbox');
            $('box-sent').classList.toggle('active', box === 'sent');
            const { ok, data } = await api('/api/mail/list?box=' + box);
            if (!ok) return;
            const badge = $('unread-badge');
            if (data.unread > 0) { badge.textContent = data.unread; badge.classList.remove('hidden'); }
            else badge.classList.add('hidden');
            const list = $('maillist');
            if (!data.emails.length) { list.innerHTML = `<div class="empty">${box === 'inbox' ? '받은 메일이 없습니다.' : '보낸 메일이 없습니다.'}</div>`; clearReader(); return; }
            list.innerHTML = '';
            for (const m of data.emails) {
                const who = box === 'inbox' ? m.from_addr : ('→ ' + m.to_addr);
                const div = document.createElement('div');
                div.className = 'mailitem ' + (box === 'inbox' && !m.seen ? 'unseen' : 'seen');
                div.dataset.id = m.id;
                if (m.id === currentMailId) div.classList.add('active');
                div.innerHTML = `<div class="mi-main">
                        <div class="mi-who">${esc(who)}</div>
                        <div class="mi-sub">${esc(m.subject || '(제목 없음)')}</div>
                    </div><div class="mi-side">
                        <div class="mi-time">${fmtTime(m.created_at)}</div>
                        <div class="mi-acts">
                            <span class="mi-act rep" title="답장">↩ 답장</span>
                            <span class="mi-act del" title="삭제">✕ 삭제</span>
                        </div>
                    </div>`;
                div.onclick = () => openMail(m.id);
                const replyTo = box === 'inbox' ? m.from_addr : m.to_addr;
                div.querySelector('.mi-act.rep').onclick = (e) => {
                    e.stopPropagation();
                    openCompose({ to: replyTo, subject: 'Re: ' + (m.subject || '') });
                };
                div.querySelector('.mi-act.del').onclick = async (e) => {
                    e.stopPropagation();
                    await api('/api/mail/' + m.id, { method: 'DELETE' });
                    if (m.id === currentMailId) clearReader();
                    loadBox(currentBox);
                };
                list.appendChild(div);
            }
        }

        async function openMail(id) {
            const { ok, data: m } = await api('/api/mail/' + id);
            if (!ok) return;
            currentMailId = id;
            $('rd-subject').textContent = m.subject || '(제목 없음)';
            $('rd-from').textContent = m.from_addr;
            $('rd-to').textContent = m.to_addr;
            $('rd-date').textContent = new Date(m.created_at).toLocaleString('ko-KR');
            $('rd-body').textContent = m.body_text || '';
            const aw = $('rd-atts'); aw.innerHTML = '';
            for (const a of (m.attachments || [])) {
                const link = document.createElement('a');
                link.className = 'att-chip';
                link.href = '/api/mail/' + id + '/att/' + a.id;
                link.setAttribute('download', a.filename || 'file');
                link.textContent = '📎 ' + (a.filename || 'file') + ' (' + fmtSize(a.size) + ')';
                aw.appendChild(link);
            }
            $('reader-footer').style.display = aw.children.length ? '' : 'none';
            showReaderPane('mail');
            document.querySelectorAll('.mailitem.active').forEach(e => e.classList.remove('active'));
            const el = document.querySelector('.mailitem[data-id="' + id + '"]');
            if (el) {
                el.classList.add('active');
                if (el.classList.contains('unseen')) {           // just got read → update badge
                    el.classList.remove('unseen'); el.classList.add('seen');
                    const badge = $('unread-badge');
                    const n = Math.max(0, (parseInt(badge.textContent, 10) || 0) - 1);
                    if (n > 0) badge.textContent = n; else badge.classList.add('hidden');
                }
            }
            if (window.matchMedia('(max-width: 760px)').matches) $('reader').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function openCompose(prefill) {
            prefill = prefill || {};
            $('cp-title').textContent = prefill.to ? '답장' : '새 메일';
            $('cp-to').value = prefill.to || '';
            $('cp-subject').value = prefill.subject || '';
            $('cp-body').value = prefill.body || '';
            $('cp-files').value = '';
            $('cp-msg').textContent = '';
            document.querySelectorAll('.mailitem.active').forEach(e => e.classList.remove('active'));
            currentMailId = null;
            showReaderPane('compose');
            $('cp-to').focus();
            if (window.matchMedia('(max-width: 760px)').matches) $('reader').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        function closeCompose() { clearReader(); }
        function fileToB64(file) {
            return new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = () => resolve(String(r.result).split(',')[1] || '');
                r.onerror = reject;
                r.readAsDataURL(file);
            });
        }
        async function doSend(e) {
            e.preventDefault();
            const to = $('cp-to').value.trim();
            const subject = $('cp-subject').value;
            const body = $('cp-body').value;
            const m = $('cp-msg');
            const files = Array.from($('cp-files').files || []);
            if (files.reduce((a, f) => a + f.size, 0) > 10 * 1024 * 1024) {
                m.className = 'msg err'; m.textContent = '첨부파일이 너무 큽니다. (최대 10MB)'; return false;
            }
            m.className = 'msg'; m.textContent = '전송 중…';
            const attachments = [];
            for (const f of files) attachments.push({ filename: f.name, mime: f.type || 'application/octet-stream', content: await fileToB64(f) });
            const { ok, data } = await api('/api/mail/send', { method: 'POST', body: JSON.stringify({ to, subject, body, attachments }) });
            if (!ok) { m.className = 'msg err'; m.textContent = data.error || '보내지 못했습니다.'; return false; }
            m.className = 'msg ok'; m.textContent = '보냈습니다.';
            setTimeout(() => { clearReader(); loadBox(currentBox); }, 800);
            return false;
        }

        // ── settings ──
        function toggleSettings() {
            const p = $('settings-panel');
            const shown = p.classList.toggle('hidden');
            $('btn-settings').classList.toggle('on', !shown);
            if (!shown && me && me.status === 'admin') loadPending();
        }
        function initSettings() { $('backup-input').value = (me && me.backup_email) || ''; }
        async function saveBackup() {
            const backup_email = $('backup-input').value.trim();
            const m = $('backup-msg');
            const { ok, data } = await api('/api/mail/settings/backup', { method: 'POST', body: JSON.stringify({ backup_email }) });
            if (!ok) { m.className = 'msg err'; m.textContent = data.error || '저장에 실패했습니다.'; return; }
            me.backup_email = data.backup_email;
            m.className = 'msg ok';
            m.textContent = data.backup_email ? '저장되었습니다.' : '해제되었습니다.';
        }

        // ── admin ──
        async function loadPending() {
            const { ok, data } = await api('/api/admin/pending');
            if (!ok) return;
            const box = $('pending-list');
            if (!data.length) { box.textContent = '대기 중인 신청이 없습니다.'; return; }
            box.innerHTML = '';
            for (const u of data) {
                const row = document.createElement('div');
                row.className = 'pending-item';
                row.innerHTML = `<span class="email-badge">${esc(u.email)}</span>
                    <span class="acts"><button class="mini approve">승인</button><button class="mini reject">거절</button></span>`;
                row.querySelector('.approve').onclick = async () => { await api('/api/admin/approve', { method: 'POST', body: JSON.stringify({ username: u.username }) }); loadPending(); };
                row.querySelector('.reject').onclick  = async () => { await api('/api/admin/reject',  { method: 'POST', body: JSON.stringify({ username: u.username }) }); loadPending(); };
                box.appendChild(row);
            }
        }

        // ── boot ──
        async function refresh() {
            const { data } = await api('/api/auth/me');
            me = data.user;
            if (!me) { $('auth-card').classList.remove('hidden'); $('app-card').classList.add('hidden'); document.body.classList.remove('app-mode'); return; }
            $('auth-card').classList.add('hidden');
            $('app-card').classList.remove('hidden');
            document.body.classList.add('app-mode');
            $('me-email').textContent = me.email;
            $('me-status').innerHTML = `<span class="status-pill">${me.status}</span>`;
            initSettings();
            $('admin-panel').classList.toggle('hidden', me.status !== 'admin');
            clearReader();
            loadBox('inbox');
        }
        refresh();
    </script>
</body>
</html>
